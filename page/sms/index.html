<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>短信测压控制台</title>
  
  <script src="https://shuoweb.com/common.js"></script>
  <script src="./fun.js"></script>

  <style>
    /* =========================================================
       极致实用主义样式，100% 依赖 common.js 的基础变量，不做多余美化
       ========================================================= */
    body {
      /* 基础背景和文字颜色交给 common.js，这里只确保不溢出 */
      padding-bottom: 40px;
    }

    .app-container {
      /* 修复导航栏遮挡：留出顶部空间 */
      margin-top: 90px; 
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 15px;
      display: grid;
      gap: 20px;
    }

    /* 响应式：PC双栏，手机单栏 */
    @media (min-width: 768px) {
      .app-container {
        grid-template-columns: 350px 1fr;
      }
    }

    /* 面板基础结构 */
    .panel {
      background: var(--card-bg);
      border: 1px solid rgba(150, 150, 150, 0.2);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--text-main);
    }

    .panel-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 8px;
      display: inline-block;
    }

    /* 表单项布局 */
    .form-item {
      margin-bottom: 15px;
    }
    .form-item label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--text-main);
    }
    .form-item input[type="text"],
    .form-item input[type="password"],
    .form-item input[type="number"] {
      /* 完全使用 common.js 的 input 样式，仅控制宽度和边距 */
      width: 100%;
      margin: 0; 
    }

    /* 数据统计网格 */
    .data-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
      background: var(--bg);
      padding: 15px;
      border-radius: var(--radius);
      border: 1px solid rgba(150, 150, 150, 0.1);
    }
    .data-item {
      display: flex;
      flex-direction: column;
    }
    .data-item span:first-child {
      font-size: 12px;
      color: var(--text-sub);
    }
    .data-item span:last-child {
      font-size: 20px;
      font-weight: bold;
      color: var(--primary);
      font-family: monospace;
    }

    /* 日志控制区 */
    .log-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-sub);
    }

    /* 终端日志区 */
    #logBox {
      height: 500px;
      background: #1e1e1e; /* 纯正终端黑 */
      color: #d4d4d4;
      border-radius: 8px;
      padding: 10px;
      overflow-y: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid #333;
    }
    .log-line {
      margin-bottom: 4px;
      word-break: break-all;
      border-bottom: 1px dashed rgba(255,255,255,0.05);
      padding-bottom: 2px;
    }
    .log-time { color: #858585; margin-right: 8px; }
    .c-info { color: #4fc1ff; }
    .c-success { color: #4caf50; font-weight: bold; }
    .c-error { color: #f44336; }
    .c-warn { color: #ffeb3b; }

    /* 错误提示文字 */
    .err-text {
      color: #e53935;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    /* 操作区按钮强制填满 */
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }
    .action-group button {
      width: 100%;
      margin: 0;
    }
    /* 单独给停止按钮上个色（利用透明度区分） */
    #stopBtn {
      background: #e53935;
    }
    #stopBtn:hover {
      background: #d32f2f;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="panel">
      <div class="panel-title">任务配置台</div>
      
      <div class="form-item">
        <label>目标手机号 (Target Phone)</label>
        <input type="text" id="phone" placeholder="请输入 11 位手机号" maxlength="11" autocomplete="off">
        <div class="err-text" id="phoneErr">请输入正确的11位手机号码</div>
      </div>
      
      <div class="form-item">
        <label>执行轮数 (Loop Count)</label>
        <input type="number" id="loopCount" value="1" min="1">
      </div>
      
      <div class="form-item">
        <label>并发线程 (Thread / Workers)</label>
        <input type="number" id="threadCount" value="50" min="1">
      </div>

      <div class="form-item">
        <label>轮次冷却延时 (Delay ms)</label>
        <input type="number" id="delayMs" value="1500" min="0" step="100">
      </div>

      <hr style="border: 0; border-top: 1px solid rgba(150,150,150,0.2); margin: 20px 0;">

      <label style="font-size: 14px; font-weight: 600; margin-bottom: 5px; display: block; color: var(--text-main);">实时统计 (Realtime Stats)</label>
      <div class="data-grid">
        <div class="data-item">
          <span>总请求数</span>
          <span id="stTotal">0</span>
        </div>
        <div class="data-item">
          <span>成功率</span>
          <span id="stRate">0.00%</span>
        </div>
        <div class="data-item">
          <span>成功返回</span>
          <span id="stOk" style="color: #4caf50;">0</span>
        </div>
        <div class="data-item">
          <span>异常/拦截</span>
          <span id="stErr" style="color: #f44336;">0</span>
        </div>
      </div>

      <div class="data-item" style="flex-direction: row; justify-content: space-between; align-items: center;">
        <span style="font-size: 12px; color: var(--text-sub);">可用接口引擎数：</span>
        <span id="apiCount" style="font-weight: bold; color: var(--primary);">Loading...</span>
      </div>

      <div class="action-group">
        <button id="startBtn" onclick="startTask()">▶ 启动测试任务</button>
        <button id="stopBtn" onclick="stopTask()">■ 强制停止</button>
      </div>
    </div>

    <div class="panel" style="display: flex; flex-direction: column;">
      <div class="log-controls">
        <div class="panel-title" style="margin: 0;">运行日志 (Terminal Log)</div>
        
        <div style="display: flex; gap: 10px; align-items: center;">
          <label class="checkbox-wrap">
            <input type="checkbox" id="autoScroll" checked> 自动滚动
          </label>
          <button onclick="clearLog()" style="padding: 6px 12px; font-size: 12px; margin: 0;">清空</button>
          <button onclick="exportLog()" style="padding: 6px 12px; font-size: 12px; margin: 0;">导出 TXT</button>
        </div>
      </div>
      
      <div id="logBox"></div>
    </div>

  </div>

  <script>
    /* ==========================================
       核心业务逻辑：完全侧重于实用性和并发控制
       ========================================== */
    
    let isRunning = false;
    let stopFlag = false;
    let allSenders = [];
    let stats = { total: 0, ok: 0, err: 0 };

    // 获取 DOM 元素
    const dom = {
      phone: document.getElementById('phone'),
      phoneErr: document.getElementById('phoneErr'),
      loopCount: document.getElementById('loopCount'),
      threadCount: document.getElementById('threadCount'),
      delayMs: document.getElementById('delayMs'),
      logBox: document.getElementById('logBox'),
      autoScroll: document.getElementById('autoScroll'),
      stTotal: document.getElementById('stTotal'),
      stOk: document.getElementById('stOk'),
      stErr: document.getElementById('stErr'),
      stRate: document.getElementById('stRate'),
      apiCount: document.getElementById('apiCount')
    };

    // --- 日志系统 ---
    function log(msg, type = 'c-info') {
      const time = new Date().toTimeString().split(' ')[0];
      const div = document.createElement('div');
      div.className = 'log-line';
      div.innerHTML = `<span class="log-time">[${time}]</span><span class="${type}">${msg}</span>`;
      
      dom.logBox.appendChild(div);

      // 限制DOM数量，防止浏览器卡死（保留最后2000条）
      if (dom.logBox.childNodes.length > 2000) {
        dom.logBox.removeChild(dom.logBox.firstChild);
      }

      if (dom.autoScroll.checked) {
        dom.logBox.scrollTop = dom.logBox.scrollHeight;
      }
    }

    function clearLog() {
      dom.logBox.innerHTML = '';
      log('日志已清空', 'c-info');
    }

    function exportLog() {
      const text = dom.logBox.innerText;
      if (!text) return alert('日志为空！');
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Api_Test_Log_${new Date().getTime()}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      log('日志已成功导出为 TXT 文件', 'c-success');
    }

    // --- 数据统计更新 ---
    function updateStats() {
      dom.stTotal.innerText = stats.total;
      dom.stOk.innerText = stats.ok;
      dom.stErr.innerText = stats.err;
      
      if (stats.total > 0) {
        const rate = ((stats.ok / stats.total) * 100).toFixed(2);
        dom.stRate.innerText = rate + '%';
        // 成功率低于20%标红，高于50%标绿
        dom.stRate.style.color = rate < 20 ? '#f44336' : (rate > 50 ? '#4caf50' : 'var(--primary)');
      } else {
        dom.stRate.innerText = '0.00%';
        dom.stRate.style.color = 'var(--primary)';
      }
    }

    // --- 接口装载 ---
    function loadSenders() {
      allSenders = [];
      // 遍历 window 对象，抓取所有 smsX 形式的函数
      for (let key in window) {
        if (key.startsWith('sms') && typeof window[key] === 'function') {
          allSenders.push(window[key]);
        }
      }
      
      dom.apiCount.innerText = allSenders.length;
      if (allSenders.length > 0) {
        log(`API 装载完毕，共检索到有效发包接口：${allSenders.length} 个`, 'c-success');
      } else {
        log(`致命错误：未发现有效发包接口，请确认 fun.js 是否正确加载！`, 'c-error');
      }
    }

    // --- 线程并发执行器 ---
    async function executeConcurrently(senders, phone, maxWorkers) {
      const queue = [...senders];
      
      // 随机打乱队列，避免按固定顺序触发同一服务商的风控
      queue.sort(() => Math.random() - 0.5);
      
      const workers = [];
      const workerCount = Math.min(maxWorkers, queue.length);
      
      for (let i = 0; i < workerCount; i++) {
        workers.push((async () => {
          while (queue.length > 0 && !stopFlag) {
            const sender = queue.pop();
            try {
              // 执行 fun.js 中的发包函数
              const isSuccess = await sender(phone);
              if (isSuccess) {
                stats.ok++;
                log(`[Thread-${i}] API返回200: 发送任务投递成功`, 'c-success');
              } else {
                stats.err++;
                log(`[Thread-${i}] API拒绝/异常: 返回状态非预期`, 'c-warn');
              }
            } catch (error) {
              stats.err++;
              log(`[Thread-${i}] 网络/执行故障: ${error.message || '未知异常'}`, 'c-error');
            }
            stats.total++;
            updateStats();
          }
        })());
      }
      
      // 阻塞，直到该轮次所有线程池任务完成
      await Promise.all(workers);
    }

    // --- 启停控制 ---
    function stopTask() {
      if (!isRunning) return;
      stopFlag = true;
      log('>> 接收到终止信号，正在销毁线程池...', 'c-warn');
      document.getElementById('startBtn').innerText = '正在停止...';
      document.getElementById('startBtn').disabled = true;
    }

    async function startTask() {
      if (isRunning) return alert('任务进行中，请先停止当前任务！');
      
      dom.phoneErr.style.display = 'none';
      const phone = dom.phone.value.trim();
      
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        dom.phoneErr.style.display = 'block';
        return;
      }
      if (allSenders.length === 0) {
        return log('无法启动：接口池为空', 'c-error');
      }

      // 提取配置参数
      const loopCount = parseInt(dom.loopCount.value) || 1;
      const threadCount = parseInt(dom.threadCount.value) || 50;
      const delayMs = parseInt(dom.delayMs.value) || 0;

      isRunning = true;
      stopFlag = false;
      stats = { total: 0, ok: 0, err: 0 };
      updateStats();
      
      document.getElementById('startBtn').innerText = '任务执行中...';
      log(`=== 初始化测压任务 ===`, 'c-info');
      log(`目标号码: ${phone}`, 'c-info');
      log(`并发线程: ${threadCount} | 冷却延时: ${delayMs}ms`, 'c-info');

      try {
        for (let r = 1; r <= loopCount; r++) {
          if (stopFlag) break;
          
          log(`--- 开始执行第 [ ${r} / ${loopCount} ] 轮 ---`, 'c-info');
          
          await executeConcurrently(allSenders, phone, threadCount);
          
          if (stopFlag) break;
          
          if (r < loopCount && delayMs > 0) {
            log(`第 ${r} 轮执行完毕，进入冷却挂起: ${delayMs}ms ...`, 'c-warn');
            await new Promise(resolve => setTimeout(resolve, delayMs));
          }
        }
      } catch (err) {
        log(`主循环严重崩溃: ${err.message}`, 'c-error');
      } finally {
        isRunning = false;
        document.getElementById('startBtn').innerText = '▶ 启动测试任务';
        document.getElementById('startBtn').disabled = false;
        
        if (stopFlag) {
          log('任务已被人工强制终止。', 'c-warn');
        } else {
          log('预设队列跑完，任务正常结束。', 'c-success');
        }
      }
    }

    // --- 初始化 ---
    window.onload = () => {
      // 稍微延迟装载，保证 fun.js 脚本被完全解析到 window 环境
      setTimeout(() => {
        log('终端组件初始化完成，开始装载 API...', 'c-info');
        loadSenders();
      }, 500);
    };
  </script>
</body>
</html>
