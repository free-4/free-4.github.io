<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>关于我</title>
    <style>
      :root{
        --bg:#f7f8fb;
        --card:#ffffff;
        --accent:#2b6cb0;
        --muted:#666;
      }
      html,body{
        height:100%;
        margin:0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
        background:linear-gradient(180deg, #f2f6fb 0%, var(--bg) 100%);
        color:#111;
      }
      .wrap{
        max-width:760px;
        margin:48px auto;
        padding:20px;
      }
      .card{
        background:var(--card);
        border-radius:12px;
        padding:28px;
        box-shadow: 0 6px 18px rgba(30,40,60,0.08);
      }
      h1{
        margin:0 0 8px 0;
        color:var(--accent);
        font-size:1.8rem;
      }
      .subtitle{
        margin:0 0 18px 0;
        color:var(--muted);
        font-size:0.95rem;
      }
      p{
        line-height:1.7;
        margin:10px 0;
      }
      .meta{
        margin-top:18px;
        padding-top:12px;
        border-top:1px dashed #eee;
        color:var(--muted);
        font-size:0.92rem;
      }
      .small{
        font-size:0.9rem;
        color:#444;
      }
      .center{
        text-align:center;
      }
      a.profile-link{
        display:inline-block;
        margin-top:14px;
        color:var(--accent);
        text-decoration:none;
        padding:8px 14px;
        border-radius:8px;
        border:1px solid rgba(43,108,176,0.12);
        transition:all .18s;
      }
      a.profile-link:hover{
        transform:translateY(-2px);
        box-shadow:0 6px 18px rgba(43,108,176,0.08);
      }
      @media (max-width:480px){
        .wrap{ margin:20px; padding:12px; }
        .card{ padding:18px; }
      }
    </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>关于我</h1>
      <p class="subtitle">在校高中生 · 业余开发者</p>

      <p>你好！我是一名在校高中生，利用课余时间开发和维护这个个人网站。做网站是我的兴趣之一，也是一种记录成长和实践前端技能的方式。</p>

      <p class="small">我的第一个域名是 <strong>escape123.xyz</strong>（已弃用）。后来我又买了 <strong>shuocc.xyz</strong>，现在使用的是 <strong>shuoweb.com</strong> — 这个域名由我的名字缩写 + web 组成，对我有特殊意义，所以我会一直保留它。</p>

      <p class="small">当时购买和续费域名的经历挺有趣（和心如刀割也有关系），但我很珍惜这个小项目带来的成长。</p>

      <div class="meta">
        <p>希望我们都有光明的未来。Have a good day!</p>
      </div>
    </div>
  </div>

  <script src="../common.js"></script>
</body>
</html>
