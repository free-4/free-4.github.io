<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萧县中学2025级高一学生信息查询</title>
    <!-- 引入公共JS（内置CSS） -->
    <script src="https://shuoweb.com/common.js"></script>
    <style>
        .wrap{max-width:900px;margin:3rem auto;padding:0 1rem;}
        .search-box{display:flex;gap:10px;margin-bottom:2rem;}
        #keyword{flex:1;padding:12px;font-size:16px;border:1px #ccc solid;border-radius:6px;}
        #searchBtn{padding:12px 24px;cursor:pointer;border:none;border-radius:6px;background:#2563eb;color:#fff;}
        table{width:100%;border-collapse:collapse;}
        th,td{border:1px #ddd solid;padding:12px;text-align:center;}
        th{background:#f5f7fa;}
        .empty{text-align:center;padding:3rem;color:#666;font-size:15px;}
    </style>
</head>
<body>
<div class="wrap">
    <h2>萧县中心学生信息查询（按姓名检索）</h2>
    <div class="search-box">
        <input type="text" id="keyword" placeholder="输入学生姓名，支持模糊查询">
        <button id="searchBtn">查询</button>
    </div>
    <div id="resultBox"></div>
</div>

<script>
let studentList = [];
// 页面加载读取同目录students.json
window.onload = async ()=>{
    const res = await fetch('./students.json');
    studentList = await res.json();
};

// 查询逻辑
const search = ()=>{
    const key = document.getElementById('keyword').value.trim();
    const resultDom = document.getElementById('resultBox');
    if(!key){
        resultDom.innerHTML = '<div class="empty">请输入需要查询的学生姓名</div>';
        return;
    }
    // 模糊匹配姓名
    const filterArr = studentList.filter(item=>item.name.includes(key));
    if(filterArr.length===0){
        resultDom.innerHTML = '<div class="empty">未查询到对应学生信息</div>';
        return;
    }
    // 渲染表格
    let html = `<table>
        <thead><tr><th>姓名</th><th>身份证号码</th><th>原班级</th></tr></thead><tbody>`;
    filterArr.forEach(ele=>{
        html += `<tr>
            <td>${ele.name}</td>
            <td>${ele.idcard}</td>
            <td>${ele.class}</td>
        </tr>`;
    })
    html += '</tbody></table>';
    resultDom.innerHTML = html;
};

// 绑定按钮和回车
document.getElementById('searchBtn').onclick = search;
document.getElementById('keyword').onkeydown = e=>{
    if(e.key==='Enter') search();
}
</script>
</body>
</html>
