<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>世界人口时钟</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --glass:        rgba(255,255,255,0.72);
  --glass-strong: rgba(255,255,255,0.88);
  --glass-border: rgba(255,255,255,0.95);
  --glass-shadow: 0 8px 32px rgba(100,120,180,0.12), 0 1.5px 0 rgba(255,255,255,0.9) inset;
  --accent:  #2f5be8;
  --accent2: #e84343;
  --accent3: #1aaa7c;
  --text:    #151c2e;
  --sub:     #6b7a9a;
  --divider: rgba(120,140,200,0.15);
  --serif:   'Instrument Serif', Georgia, serif;
  --sans:    'Outfit', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--sans);
  background: #eef2f8;
  background-image:
    radial-gradient(ellipse 90% 60% at 15% 0%,  rgba(130,160,255,0.22) 0%, transparent 55%),
    radial-gradient(ellipse 70% 70% at 88% 90%, rgba(100,200,180,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 75% 12%, rgba(200,180,255,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 30% 85%, rgba(130,180,255,0.12) 0%, transparent 50%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  padding-bottom: 88px;
}

/* HEADER */
header {
  position: sticky; top:0; z-index:200;
  background: rgba(238,242,248,0.82);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border-bottom: 1px solid var(--divider);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}

.header-title { font-size:15px; font-weight:600; letter-spacing:0.01em; }

.live-badge {
  display:flex; align-items:center; gap:6px;
  background: rgba(47,91,232,0.08);
  border: 1px solid rgba(47,91,232,0.18);
  border-radius:20px; padding:4px 10px;
}

.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--accent);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.live-text { font-size:11px; font-weight:500; color:var(--accent); letter-spacing:0.08em; }

/* HERO */
.hero {
  padding: 32px 20px 0;
  text-align:center;
  animation: fadeUp 0.5s ease both;
}

.hero-eyebrow {
  font-size:11px; font-weight:500; letter-spacing:0.22em;
  text-transform:uppercase; color:var(--sub); margin-bottom:10px;
}

.hero-counter-wrap { display:inline-block; position:relative; }

.hero-glow {
  position:absolute; inset:-30px -20px;
  background: radial-gradient(ellipse, rgba(47,91,232,0.10) 0%, transparent 70%);
  border-radius:50%; pointer-events:none;
}

.hero-counter {
  font-family: var(--serif);
  font-size: clamp(36px,9.5vw,56px);
  letter-spacing:-0.02em; color:var(--text); line-height:1;
}

.hero-caption { margin-top:10px; font-size:12px; color:var(--sub); }

/* GLASS CARD */
.glass {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border: 1px solid var(--glass-border);
  border-radius:18px;
  box-shadow: var(--glass-shadow);
}

/* SECTION */
.section { padding: 20px 16px 0; }

.section-label {
  font-size:10px; font-weight:600; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--sub);
  margin-bottom:10px; padding-left:4px;
}

/* STAT ROW */
.stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

.stat-card { border-radius:16px; padding:16px 12px; }

.stat-icon { width:28px; height:28px; margin-bottom:10px; }

.stat-num {
  font-family:var(--serif);
  font-size: clamp(15px,4.2vw,21px);
  line-height:1; letter-spacing:-0.01em;
}
.stat-num.blue  { color:var(--accent); }
.stat-num.red   { color:var(--accent2); }
.stat-num.green { color:var(--accent3); }

.stat-lbl {
  font-size:10px; font-weight:500;
  color:var(--sub); margin-top:5px;
  letter-spacing:0.05em; line-height:1.4;
}

/* PROGRESS */
.progress-card { padding:16px; }

.progress-row {
  display:flex; justify-content:space-between; align-items:center;
  font-size:11px; font-weight:500; margin-bottom:7px; color:var(--sub);
}

.progress-pct { color:var(--accent); }

.progress-track {
  height:5px; border-radius:3px;
  background:rgba(100,120,180,0.12); overflow:hidden;
}

.progress-fill {
  height:100%; border-radius:3px;
  background: linear-gradient(90deg, var(--accent), #6d8ef0);
  transition: width 1s linear;
}

/* RATES GRID */
.rates-grid {
  display:grid; grid-template-columns:1fr 1fr;
}

.rate-item { padding:14px 16px; }
.rate-item:nth-child(1) { border-right:1px solid var(--divider); border-bottom:1px solid var(--divider); }
.rate-item:nth-child(2) { border-bottom:1px solid var(--divider); }
.rate-item:nth-child(3) { border-right:1px solid var(--divider); }

.rate-lbl { font-size:10px; font-weight:500; color:var(--sub); letter-spacing:0.08em; margin-bottom:5px; }
.rate-val {
  font-family:var(--serif); font-size:20px; letter-spacing:-0.01em; line-height:1;
}
.rate-val.blue  { color:var(--accent); }
.rate-val.red   { color:var(--accent2); }
.rate-val.green { color:var(--accent3); }
.rate-val.dark  { color:var(--text); }

/* COUNTRY LIST */
.country-item {
  display:flex; align-items:center; gap:11px;
  padding:13px 16px;
}

.country-item + .country-item { border-top:1px solid var(--divider); }

.c-rank { font-size:11px; font-weight:500; color:var(--sub); width:18px; text-align:right; flex-shrink:0; }

.c-flag {
  width:28px; height:20px; border-radius:3px;
  flex-shrink:0; overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,0.11);
}
.c-flag svg { display:block; width:100%; height:100%; }

.c-info { flex:1; min-width:0; }

.c-name {
  font-size:13px; font-weight:500;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.c-bar-track {
  height:2px; background:rgba(100,120,180,0.12);
  border-radius:2px; margin-top:5px; overflow:hidden;
}

.c-bar-fill {
  height:100%; border-radius:2px;
  background:linear-gradient(90deg, rgba(47,91,232,0.55), rgba(47,91,232,0.22));
}

.c-pop-col { text-align:right; flex-shrink:0; }

.c-pop {
  font-family:var(--serif); font-size:14px;
  color:var(--text); letter-spacing:-0.01em;
}

.c-pct { font-size:10px; color:var(--sub); margin-top:1px; }

.c-trend { width:16px; height:16px; flex-shrink:0; }

/* YEAR GRID */
.year-grid {
  display:grid; grid-template-columns:1fr 1fr;
}

.year-item { padding:14px 16px; }
.year-item:nth-child(1) { border-right:1px solid var(--divider); border-bottom:1px solid var(--divider); }
.year-item:nth-child(2) { border-bottom:1px solid var(--divider); }
.year-item:nth-child(3) { border-right:1px solid var(--divider); }

.year-lbl { font-size:10px; font-weight:500; color:var(--sub); letter-spacing:0.08em; margin-bottom:5px; }
.year-val {
  font-family:var(--serif); font-size:17px; letter-spacing:-0.01em; line-height:1;
}
.year-val.blue  { color:var(--accent); }
.year-val.red   { color:var(--accent2); }
.year-val.green { color:var(--accent3); }

/* BOTTOM BAR */
.bottom-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background: rgba(238,242,248,0.90);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border-top:1px solid var(--divider);
  padding:12px 20px 22px;
  display:flex; align-items:center; justify-content:center; gap:0;
}

.bb-piece { text-align:center; padding:0 14px; }
.bb-num { font-family:var(--serif); font-size:22px; letter-spacing:-0.01em; color:var(--text); line-height:1; }
.bb-lbl { font-size:9px; font-weight:500; letter-spacing:0.12em; color:var(--sub); margin-top:2px; }
.bb-sep { font-family:var(--serif); font-size:18px; color:var(--divider); padding-bottom:6px; align-self:flex-end; }
.bb-divider { width:1px; height:36px; background:var(--divider); margin:0 4px; }
.bb-date { text-align:left; }

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

.hero  { animation: fadeUp 0.45s 0.00s ease both; }
.sec-1 { animation: fadeUp 0.45s 0.10s ease both; }
.sec-2 { animation: fadeUp 0.45s 0.18s ease both; }
.sec-3 { animation: fadeUp 0.45s 0.26s ease both; }
.sec-4 { animation: fadeUp 0.45s 0.34s ease both; }
.sec-5 { animation: fadeUp 0.45s 0.42s ease both; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">世界人口时钟</div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span class="live-text">LIVE</span>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">全球实时总人口</div>
  <div class="hero-counter-wrap">
    <div class="hero-glow"></div>
    <div class="hero-counter" id="world-pop">—</div>
  </div>
  <div class="hero-caption">基准：联合国 2024 · 每 200ms 更新</div>
</div>

<!-- TODAY STATS -->
<div class="section sec-1">
  <div class="section-label">今日累计 · 自 UTC 零时起</div>
  <div class="stat-row">

    <div class="glass stat-card">
      <svg class="stat-icon" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" fill="rgba(47,91,232,0.08)" stroke="rgba(47,91,232,0.2)" stroke-width="1"/>
        <path d="M14 8v12M9 13l5-5 5 5" stroke="#2f5be8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="stat-num blue" id="today-births">—</div>
      <div class="stat-lbl">今日<br>出生</div>
    </div>

    <div class="glass stat-card">
      <svg class="stat-icon" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" fill="rgba(232,67,67,0.07)" stroke="rgba(232,67,67,0.2)" stroke-width="1"/>
        <path d="M14 20V8M9 15l5 5 5-5" stroke="#e84343" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="stat-num red" id="today-deaths">—</div>
      <div class="stat-lbl">今日<br>死亡</div>
    </div>

    <div class="glass stat-card">
      <svg class="stat-icon" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" fill="rgba(26,170,124,0.07)" stroke="rgba(26,170,124,0.2)" stroke-width="1"/>
        <path d="M8 14h12M17 10l4 4-4 4" stroke="#1aaa7c" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="stat-num green" id="today-net">—</div>
      <div class="stat-lbl">今日<br>净增</div>
    </div>

  </div>
</div>

<!-- DAY PROGRESS -->
<div class="section sec-2">
  <div class="glass progress-card">
    <div class="progress-row">
      <span>今日进度</span>
      <span class="progress-pct" id="day-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="day-bar" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- RATES -->
<div class="section sec-2">
  <div class="section-label">变动速率</div>
  <div class="glass rates-grid">
    <div class="rate-item">
      <div class="rate-lbl">出生 / 秒</div>
      <div class="rate-val blue">4.41</div>
    </div>
    <div class="rate-item">
      <div class="rate-lbl">死亡 / 秒</div>
      <div class="rate-val red">1.98</div>
    </div>
    <div class="rate-item">
      <div class="rate-lbl">净增 / 秒</div>
      <div class="rate-val green">+2.43</div>
    </div>
    <div class="rate-item">
      <div class="rate-lbl">年增长率</div>
      <div class="rate-val dark">0.87%</div>
    </div>
  </div>
</div>

<!-- COUNTRIES -->
<div class="section sec-3">
  <div class="section-label">各国实时人口</div>
  <div class="glass" id="country-list"></div>
</div>

<!-- YEAR STATS -->
<div class="section sec-4">
  <div class="section-label">本年度累计</div>
  <div class="glass year-grid">
    <div class="year-item">
      <div class="year-lbl">今年出生</div>
      <div class="year-val blue" id="year-births">—</div>
    </div>
    <div class="year-item">
      <div class="year-lbl">今年死亡</div>
      <div class="year-val red" id="year-deaths">—</div>
    </div>
    <div class="year-item">
      <div class="year-lbl">今年净增</div>
      <div class="year-val green" id="year-net">—</div>
    </div>
    <div class="year-item">
      <div class="year-lbl">全年出生预测</div>
      <div class="year-val" style="font-size:14px;color:var(--sub);">1.39 亿</div>
    </div>
  </div>
</div>

<div style="height:8px"></div>

<!-- BOTTOM CLOCK BAR -->
<div class="bottom-bar">
  <div class="bb-piece">
    <div class="bb-num" id="clk-h">00</div>
    <div class="bb-lbl">时</div>
  </div>
  <div class="bb-sep">:</div>
  <div class="bb-piece">
    <div class="bb-num" id="clk-m">00</div>
    <div class="bb-lbl">分</div>
  </div>
  <div class="bb-sep">:</div>
  <div class="bb-piece">
    <div class="bb-num" id="clk-s">00</div>
    <div class="bb-lbl">秒</div>
  </div>
  <div class="bb-divider"></div>
  <div class="bb-piece bb-date">
    <div class="bb-num" id="clk-date" style="font-size:13px;font-family:var(--sans);font-weight:500;color:var(--sub)">—</div>
    <div class="bb-lbl">本地时间</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   DATA SOURCES: UN World Population Prospects 2024
   Base date: 2026-01-01 00:00:00 UTC
   World pop:  8,162,000,000
   Births/yr:  139,000,000  → 4.408/sec
   Deaths/yr:   62,600,000  → 1.985/sec
   Net/yr:      76,400,000  → 2.423/sec
══════════════════════════════════════════════════ */

const BASE_DATE = new Date('2026-01-01T00:00:00Z');
const BASE_POP  = 8_162_000_000;
const B_PS = 4.408;
const D_PS = 1.985;
const N_PS = B_PS - D_PS;

/* [name, ISO2, basePop Jan-1-2026, netPerSec]
   Individual growth rates from UN 2024 projections   */
const COUNTRIES = [
  ['印度',       'IN', 1_441_000_000,  0.411],  // +0.9%/yr
  ['中国',       'CN', 1_408_000_000, -0.044],  // -0.1%/yr
  ['美国',       'US',   341_000_000,  0.054],  // +0.5%/yr
  ['印度尼西亚', 'ID',   283_000_000,  0.081],  // +0.9%/yr
  ['巴基斯坦',   'PK',   251_000_000,  0.159],  // +2.0%/yr
  ['尼日利亚',   'NG',   232_000_000,  0.177],  // +2.4%/yr
  ['巴西',       'BR',   217_000_000,  0.034],  // +0.5%/yr
  ['孟加拉国',   'BD',   174_000_000,  0.055],  // +1.0%/yr
  ['俄罗斯',     'RU',   144_000_000, -0.009],  // -0.2%/yr
  ['埃塞俄比亚', 'ET',   133_000_000,  0.106],  // +2.5%/yr
  ['墨西哥',     'MX',   130_000_000,  0.054],  // +1.3%/yr
  ['日本',       'JP',   123_000_000, -0.039],  // -1.0%/yr
];

/* Inline SVG flags — simplified geometric representation */
const FLAGS = {
  IN:`<svg viewBox="0 0 30 20"><rect width="30" height="6.67" fill="#FF9933"/><rect y="6.67" width="30" height="6.67" fill="#fff"/><rect y="13.33" width="30" height="6.67" fill="#138808"/><circle cx="15" cy="10" r="2.8" fill="none" stroke="#000080" stroke-width="0.7"/><line x1="15" y1="7.2" x2="15" y2="12.8" stroke="#000080" stroke-width="0.5"/><line x1="12.2" y1="10" x2="17.8" y2="10" stroke="#000080" stroke-width="0.5"/></svg>`,
  CN:`<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#DE2910"/><polygon points="5,2 6,5 9,5 6.5,6.8 7.5,10 5,8.2 2.5,10 3.5,6.8 1,5 4,5" fill="#FFDE00"/><polygon points="10,1.5 10.8,3.5 13,3.5 11.3,4.8 12,6.8 10,5.6 8,6.8 8.7,4.8 7,3.5 9.2,3.5" fill="#FFDE00" transform="scale(0.55) translate(10,2)"/></svg>`,
  US:`<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#B22234"/><rect y="1.54" width="30" height="1.54" fill="#fff"/><rect y="4.62" width="30" height="1.54" fill="#fff"/><rect y="7.69" width="30" height="1.54" fill="#fff"/><rect y="10.77" width="30" height="1.54" fill="#fff"/><rect y="13.85" width="30" height="1.54" fill="#fff"/><rect y="16.92" width="30" height="1.54" fill="#fff"/><rect width="12" height="10.77" fill="#3C3B6E"/></svg>`,
  ID:`<svg viewBox="0 0 30 20"><rect width="30" height="10" fill="#CE1126"/><rect y="10" width="30" height="10" fill="#fff"/></svg>`,
  PK:`<svg viewBox="0 0 30 20"><rect width="7" height="20" fill="#fff"/><rect x="7" width="23" height="20" fill="#01411C"/><circle cx="17" cy="10" r="4.5" fill="#fff"/><circle cx="18.5" cy="10" r="3.6" fill="#01411C"/></svg>`,
  NG:`<svg viewBox="0 0 30 20"><rect width="10" height="20" fill="#008751"/><rect x="10" width="10" height="20" fill="#fff"/><rect x="20" width="10" height="20" fill="#008751"/></svg>`,
  BR:`<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#009C3B"/><polygon points="15,1 29,10 15,19 1,10" fill="#FEDF00"/><circle cx="15" cy="10" r="4.8" fill="#002776"/><path d="M10.5,8.5 Q15,7 19.5,8.5" stroke="#fff" stroke-width="0.8" fill="none"/></svg>`,
  BD:`<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#006A4E"/><circle cx="14" cy="10" r="6.5" fill="#F42A41"/></svg>`,
  RU:`<svg viewBox="0 0 30 20"><rect width="30" height="6.67" fill="#fff"/><rect y="6.67" width="30" height="6.67" fill="#0033A0"/><rect y="13.33" width="30" height="6.67" fill="#CC0000"/></svg>`,
  ET:`<svg viewBox="0 0 30 20"><rect width="30" height="6.67" fill="#078930"/><rect y="6.67" width="30" height="6.67" fill="#FCDD09"/><rect y="13.33" width="30" height="6.67" fill="#DA121A"/><circle cx="15" cy="10" r="4.5" fill="#0F47AF"/><polygon points="15,6.5 15.8,8.9 18.4,8.9 16.3,10.4 17.1,12.8 15,11.3 12.9,12.8 13.7,10.4 11.6,8.9 14.2,8.9" fill="#FCDD09" transform="scale(0.55) translate(12.7,6)"/></svg>`,
  MX:`<svg viewBox="0 0 30 20"><rect width="10" height="20" fill="#006847"/><rect x="10" width="10" height="20" fill="#fff"/><rect x="20" width="10" height="20" fill="#CE1126"/><circle cx="15" cy="10" r="2.5" fill="#8B4513" opacity="0.5"/></svg>`,
  JP:`<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#fff"/><circle cx="15" cy="10" r="6.5" fill="#BC002D"/></svg>`,
};

/* Helpers */
function pad(n) { return String(n).padStart(2,'0'); }
function fmt(n) { return Math.round(n).toLocaleString('zh-CN'); }

function secsSince(date) { return (Date.now() - date.getTime()) / 1000; }

function todaySecs() {
  const now = new Date();
  const midnight = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  return (Date.now() - midnight.getTime()) / 1000;
}

function yearSecs() {
  const now = new Date();
  const jan1 = new Date(Date.UTC(now.getUTCFullYear(), 0, 1));
  return (Date.now() - jan1.getTime()) / 1000;
}

/* Build country list */
function buildCountryList() {
  const maxPop = Math.max(...COUNTRIES.map(c => c[2]));
  const html = COUNTRIES.map(([name, iso, basePop, net], i) => {
    const pct   = ((basePop / BASE_POP) * 100).toFixed(2);
    const barW  = ((basePop / maxPop) * 100).toFixed(1);
    const up    = net >= 0;
    const tColor = up ? '#1aaa7c' : '#e84343';
    const tPath  = up ? 'M4 11L8 7L12 11' : 'M4 9L8 13L12 9';

    return `<div class="country-item">
      <div class="c-rank">${i+1}</div>
      <div class="c-flag">${FLAGS[iso] || ''}</div>
      <div class="c-info">
        <div class="c-name">${name}</div>
        <div class="c-bar-track"><div class="c-bar-fill" style="width:${barW}%"></div></div>
      </div>
      <div class="c-pop-col">
        <div class="c-pop" id="cp-${iso}">${fmt(basePop)}</div>
        <div class="c-pct">${pct}%</div>
      </div>
      <svg class="c-trend" viewBox="0 0 16 20" fill="none">
        <path d="${tPath}" stroke="${tColor}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>`;
  }).join('');

  document.getElementById('country-list').innerHTML = html;
}

/* Tick */
function tick() {
  const s  = secsSince(BASE_DATE);
  const ts = todaySecs();
  const ys = yearSecs();
  const now = new Date();

  // World
  document.getElementById('world-pop').textContent = fmt(BASE_POP + s * N_PS);

  // Today
  document.getElementById('today-births').textContent = fmt(ts * B_PS);
  document.getElementById('today-deaths').textContent = fmt(ts * D_PS);
  document.getElementById('today-net').textContent    = '+' + fmt(ts * N_PS);

  // Progress
  const pct = ((ts / 86400) * 100).toFixed(1);
  document.getElementById('day-pct').textContent  = pct + '%';
  document.getElementById('day-bar').style.width  = pct + '%';

  // Year
  document.getElementById('year-births').textContent = fmt(ys * B_PS);
  document.getElementById('year-deaths').textContent = fmt(ys * D_PS);
  document.getElementById('year-net').textContent    = '+' + fmt(ys * N_PS);

  // Countries (real-time)
  COUNTRIES.forEach(([, iso, basePop, net]) => {
    const el = document.getElementById('cp-' + iso);
    if (el) el.textContent = fmt(basePop + s * net);
  });

  // Clock
  document.getElementById('clk-h').textContent    = pad(now.getHours());
  document.getElementById('clk-m').textContent    = pad(now.getMinutes());
  document.getElementById('clk-s').textContent    = pad(now.getSeconds());
  document.getElementById('clk-date').textContent =
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
}

buildCountryList();
tick();
setInterval(tick, 200);
</script>
</body>
</html>
