// ====================== 全局变量 ======================
const answers = {};
const questionsContainer = document.getElementById('questionsContainer');
const submitBtn = document.getElementById('submitBtn');
const resultBox = document.getElementById('resultBox');
const resetBtn = document.getElementById('resetBtn');

// ====================== 渲染题目 ======================
function renderQuestions() {
    mbtiQuestions.forEach(question => {
        const questionCard = document.createElement('div');
        questionCard.className = 'card';
        questionCard.style.marginBottom = '20px';

        const questionText = document.createElement('p');
        questionText.textContent = `${question.id}. ${question.text}`;
        questionCard.appendChild(questionText);

        const btnGroup = document.createElement('div');

        const agreeBtn = document.createElement('button');
        agreeBtn.textContent = '符合';
        agreeBtn.className = 'btn';
        agreeBtn.dataset.qid = question.id;
        agreeBtn.dataset.value = 'agree';

        const disagreeBtn = document.createElement('button');
        disagreeBtn.textContent = '不符合';
        disagreeBtn.className = 'btn';
        disagreeBtn.dataset.qid = question.id;
        disagreeBtn.dataset.value = 'disagree';

        agreeBtn.addEventListener('click', () => handleAnswer(question.id, 'agree', agreeBtn, disagreeBtn));
        disagreeBtn.addEventListener('click', () => handleAnswer(question.id, 'disagree', disagreeBtn, agreeBtn));

        btnGroup.appendChild(agreeBtn);
        btnGroup.appendChild(disagreeBtn);
        questionCard.appendChild(btnGroup);

        questionsContainer.appendChild(questionCard);
    });
}

// ====================== 处理答案选择 ======================
function handleAnswer(qid, value, selectedBtn, otherBtn) {
    answers[qid] = value;
    selectedBtn.classList.add('btn-border');
    otherBtn.classList.remove('btn-border');
}

// ====================== 计算MBTI结果 ======================
function calculateResult() {
    if (Object.keys(answers).length < mbtiQuestions.length) {
        alert('请完成所有题目后再提交哦');
        return;
    }

    let E = 0, I = 0, S = 0, N = 0, T = 0, F = 0, J = 0, P = 0;

    mbtiQuestions.forEach(question => {
        const userAnswer = answers[question.id];
        if (userAnswer === 'agree') {
            switch (question.dimension) {
                case 'E': E++; break;
                case 'I': I++; break;
                case 'S': S++; break;
                case 'N': N++; break;
                case 'T': T++; break;
                case 'F': F++; break;
                case 'J': J++; break;
                case 'P': P++; break;
            }
        }
    });

    const ei = E >= I ? 'E' : 'I';
    const sn = S >= N ? 'S' : 'N';
    const tf = T >= F ? 'T' : 'F';
    const jp = J >= P ? 'J' : 'P';
    const type = ei + sn + tf + jp;

    const info = typeInfo[type];
    document.getElementById('mbtiType').textContent = type;
    document.getElementById('typeName').textContent = info.name;
    document.getElementById('typeDesc').textContent = info.desc;
    resultBox.style.display = 'block';

    resultBox.scrollIntoView({ behavior: 'smooth' });
}

// ====================== 重置测试 ======================
function resetTest() {
    Object.keys(answers).forEach(key => delete answers[key]);
    questionsContainer.innerHTML = '';
    resultBox.style.display = 'none';
    renderQuestions();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ====================== 绑定事件 ======================
submitBtn.addEventListener('click', calculateResult);
resetBtn.addEventListener('click', resetTest);

// ====================== 页面加载完成渲染 ======================
document.addEventListener('DOMContentLoaded', renderQuestions);
