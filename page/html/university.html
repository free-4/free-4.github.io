<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>中国大学查询系统</title>

<!-- SHUOWEB -->
<script src="https://shuoweb.com/common.js"></script>

<style>

/* 主容器 */

.main{
    max-width:1280px;
    margin:auto;

    padding-top:20px;
}

/* 顶部 */

.hero{
    margin-bottom:25px;
}

.title{
    font-size:42px;
    font-weight:800;

    color:var(--text-main);
}

.desc{
    margin-top:10px;

    color:var(--text-sub);

    line-height:1.7;
}

/* 搜索 */

.search-box{

    display:grid;

    grid-template-columns:
    1fr 180px 180px;

    gap:15px;

    margin-bottom:25px;
}

/* 输入框 */

.input,
.select{

    width:100%;
    height:56px;

    padding:0 18px;

    border:none;
    outline:none;

    border-radius:var(--radius);

    background:var(--card-bg);

    color:var(--text-main);

    font-size:15px;

    box-shadow:var(--shadow);

    border:1px solid rgba(255,255,255,.12);

    transition:.2s;
}

/* placeholder */

.input::placeholder{
    color:var(--text-sub);
}

/* select */

.select option{
    background:#fff;
    color:#000;
}

/* focus */

.input:focus,
.select:focus{

    border-color:var(--primary);

    box-shadow:
    0 0 0 4px var(--primary-light),
    var(--shadow);

}

/* 统计 */

.stats{
    display:flex;

    gap:15px;

    flex-wrap:wrap;

    margin-bottom:25px;
}

/* 单统计 */

.stat{

    flex:1;

    min-width:220px;

    background:var(--card-bg);

    border-radius:24px;

    padding:22px;

    box-shadow:var(--shadow);

    border:1px solid rgba(255,255,255,.12);
}

.stat-title{

    color:var(--text-sub);

    margin-bottom:10px;
}

.stat-value{

    font-size:34px;

    font-weight:800;

    color:var(--text-main);
}

/* 列表 */

.list{
    display:grid;
    gap:18px;
}

/* 卡片 */

.card{

    background:var(--card-bg);

    border-radius:24px;

    padding:24px;

    box-shadow:var(--shadow);

    border:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(12px);
}

/* 顶部 */

.top{

    display:flex;

    justify-content:space-between;

    gap:18px;

    flex-wrap:wrap;
}

/* 名称 */

.name{

    font-size:25px;

    font-weight:800;

    color:var(--text-main);
}

/* 学校代码 */

.code{

    margin-top:8px;

    color:var(--text-sub);

    font-size:14px;
}

/* 标签 */

.tags{

    display:flex;

    gap:8px;

    flex-wrap:wrap;
}

.tag{

    padding:7px 14px;

    border-radius:999px;

    background:var(--primary-light);

    color:var(--primary);

    font-size:13px;

    font-weight:700;
}

/* 信息区 */

.info{

    margin-top:20px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:14px;
}

/* 单项 */

.item{

    background:rgba(255,255,255,.06);

    border-radius:18px;

    padding:15px;
}

/* 标签 */

.label{

    font-size:13px;

    color:var(--text-sub);

    margin-bottom:6px;
}

/* 值 */

.value{

    color:var(--text-main);

    line-height:1.7;
}

/* 空 */

.empty,
.loading{

    text-align:center;

    padding:70px 20px;

    color:var(--text-sub);

    background:var(--card-bg);

    border-radius:24px;

    box-shadow:var(--shadow);
}

/* 手机 */

@media(max-width:768px){

    body{
        padding:14px;
    }

    .title{
        font-size:32px;
    }

    .search-box{
        grid-template-columns:1fr;
    }

    .name{
        font-size:21px;
    }

    .card{
        padding:18px;
    }

}

</style>
</head>
<body>

<div class="main">

    <!-- 顶部 -->

    <div class="hero">

        <div class="title">
            中国大学查询
        </div>

        <div class="desc">
            支持学校名称、代码、省份、层次筛选。
        </div>

    </div>

    <!-- 搜索 -->

    <div class="search-box">

        <input
        id="search"
        class="input"
        placeholder="输入大学名称 / 学校代码"
        />

        <select
        id="province"
        class="select"
        >
            <option value="">
                全部省份
            </option>
        </select>

        <select
        id="level"
        class="select"
        >
            <option value="">
                全部层次
            </option>

            <option value="本科">
                本科
            </option>

            <option value="专科">
                专科
            </option>

        </select>

    </div>

    <!-- 统计 -->

    <div class="stats">

        <div class="stat">

            <div class="stat-title">
                大学总数
            </div>

            <div
            class="stat-value"
            id="totalCount"
            >
                0
            </div>

        </div>

        <div class="stat">

            <div class="stat-title">
                当前结果
            </div>

            <div
            class="stat-value"
            id="resultCount"
            >
                0
            </div>

        </div>

    </div>

    <!-- 列表 -->

    <div
    id="list"
    class="list"
    >

        <div class="loading">
            正在加载大学数据...
        </div>

    </div>

</div>

<script>

/* DOM */

const list =
document.getElementById("list");

const search =
document.getElementById("search");

const province =
document.getElementById("province");

const level =
document.getElementById("level");

const totalCount =
document.getElementById("totalCount");

const resultCount =
document.getElementById("resultCount");

/* 数据 */

let all = [];

/* 加载 JSON */

fetch("./json/university.json")

.then(res=>res.json())

.then(data=>{

    Object.keys(data).forEach(key=>{

        province.innerHTML += `
            <option value="${key}">
                ${key}
            </option>
        `;

        data[key].forEach(item=>{

            all.push({
                ...item,
                province:key
            });

        });

    });

    totalCount.innerText =
    all.length;

    render();

})

.catch(err=>{

    console.error(err);

    list.innerHTML = `
        <div class="empty">
            university.json 加载失败
        </div>
    `;

});

/* 渲染 */

function render(){

    const keyword =
    search.value.trim();

    const p =
    province.value;

    const l =
    level.value;

    const result =
    all.filter(item=>{

        const matchKeyword =

            item.name.includes(keyword)

            ||

            item.code.includes(keyword);

        const matchProvince =

            !p ||

            item.province === p;

        const matchLevel =

            !l ||

            item.level === l;

        return (

            matchKeyword
            &&
            matchProvince
            &&
            matchLevel

        );

    });

    resultCount.innerText =
    result.length;

    /* 空 */

    if(result.length === 0){

        list.innerHTML = `
            <div class="empty">
                没有搜索结果
            </div>
        `;

        return;
    }

    /* 输出 */

    list.innerHTML = result.map(item=>`

        <div class="card">

            <div class="top">

                <div>

                    <div class="name">
                        ${item.name}
                    </div>

                    <div class="code">
                        学校代码：${item.code}
                    </div>

                </div>

                <div class="tags">

                    <div class="tag">
                        ${item.level}
                    </div>

                    ${
                        item.remark
                        ?
                        `
                        <div class="tag">
                            ${item.remark}
                        </div>
                        `
                        :
                        ''
                    }

                </div>

            </div>

            <div class="info">

                <div class="item">

                    <div class="label">
                        所属省份
                    </div>

                    <div class="value">
                        ${item.province}
                    </div>

                </div>

                <div class="item">

                    <div class="label">
                        所属部门
                    </div>

                    <div class="value">
                        ${item.department}
                    </div>

                </div>

                <div class="item">

                    <div class="label">
                        所在城市
                    </div>

                    <div class="value">
                        ${item.city}
                    </div>

                </div>

                <div class="item">

                    <div class="label">
                        备注
                    </div>

                    <div class="value">
                        ${item.remark || '无'}
                    </div>

                </div>

            </div>

        </div>

    `).join("");

}

/* 监听 */

search.oninput = render;

province.onchange = render;

level.onchange = render;

</script>

</body>
</html>
