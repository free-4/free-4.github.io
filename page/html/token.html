<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 计算器 | SHUOWEB</title>
<script src="https://shuoweb.com/common.js"></script>
</head>
<body>

<div style="max-width:700px;margin:50px auto;padding:0 20px;">
  <h2>Token 数量 & 价格计算</h2>

  <div style="margin:20px 0">
    <label>输入/粘贴文本：</label>
    <input
      type="text"
      id="textInput"
      class="input"
      style="width:100%;padding:12px 14px;border-radius:8px"
      placeholder="粘贴内容后自动计算 Token">
  </div>

  <div style="display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">
    <div>
      <label>Token 总数：</label>
      <input type="number" id="tokenTotal" class="input" readonly style="width:100%">
    </div>
    <div>
      <label>Token 单价（元）：</label>
      <input type="number" id="unitPrice" class="input" value="0.0001" step="0.0000001" style="width:100%">
    </div>
    <div>
      <label>预估总价（元）：</label>
      <input type="number" id="totalCost" class="input" readonly style="width:100%">
    </div>
  </div>
</div>

<script>
const textInput = document.getElementById('textInput')
const tokenTotal = document.getElementById('tokenTotal')
const unitPrice = document.getElementById('unitPrice')
const totalCost = document.getElementById('totalCost')

// 通用简易 Token 计算规则
function calcToken(text) {
  if (!text) return 0
  const cn = (text.match(/[\u4e00-\u9fa5]/g) || []).length
  const en = text.length - cn
  return Math.ceil(cn + en * 0.25)
}

function compute() {
  const t = calcToken(textInput.value)
  tokenTotal.value = t
  const p = parseFloat(unitPrice.value) || 0
  totalCost.value = (t * p).toFixed(6)
}

textInput.addEventListener('input', compute)
unitPrice.addEventListener('input', compute)
compute()
</script>

</body>
</html>
