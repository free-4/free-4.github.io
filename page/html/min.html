<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JS/CSS 压缩工具 | SHUOWEB</title>
  <!-- 引入SHUOWEB核心库 -->
  <script src="https://shuoweb.com/common.js" defer></script>
  <style>
    /* ================= 核心修复：全局样式隔离，彻底清除common.js干扰 ================= */
    * {
      box-sizing: border-box !important;
      -webkit-tap-highlight-color: transparent !important;
    }

    /* ================= 修复版：虚线上传区域（唯一一层虚线，无叠加）================= */
    .upload-area {
      /* 核心：先重置所有common.js强加的div样式，彻底解决双虚线 */
      all: unset !important;
      /* 重新定义，100%可控，无任何额外边框/阴影 */
      display: block !important;
      width: 100% !important;
      box-sizing: border-box !important;
      border: 2px dashed var(--text-sub) !important;
      border-radius: var(--radius) !important;
      background: var(--card-bg) !important;
      padding: 40px 16px !important;
      margin: 12px 0 20px 0 !important;
      text-align: center !important;
      cursor: pointer !important;
      transition: var(--transition) !important;
      opacity: 0.5 !important;
      overflow: hidden !important;
    }

    /* 悬浮/拖拽状态，唯一高亮，无叠加 */
    .upload-area:hover,
    .upload-area.dragover {
      opacity: 1 !important;
      border-color: var(--primary) !important;
      background: var(--primary-light) !important;
      transform: scale(1.01) !important;
      box-shadow: 0 0 0 4px var(--primary-light) !important;
    }

    body.pink .upload-area:hover,
    body.pink .upload-area.dragover {
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.15) !important;
    }

    .upload-area input {
      display: none !important;
    }

    .upload-title {
      font-size: 16px !important;
      font-weight: 500 !important;
      color: var(--text-main) !important;
      margin: 0 0 6px 0 !important;
      line-height: 1.4 !important;
    }

    .upload-desc {
      font-size: 13px !important;
      color: var(--text-sub) !important;
      margin: 0 !important;
      line-height: 1.4 !important;
    }

    /* ================= 代码文本域（无冲突版）================= */
    textarea {
      all: unset !important;
      display: block !important;
      width: 100% !important;
      min-height: 220px !important;
      box-sizing: border-box !important;
      padding: 14px 16px !important;
      margin: 10px 0 !important;
      resize: vertical !important;
      background: var(--card-bg) !important;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      font-family: Consolas, Monaco, monospace, '666font' !important;
      font-size: 14px !important;
      color: var(--text-main) !important;
      line-height: 1.6 !important;
      tab-size: 2 !important;
      transition: var(--transition) !important;
      white-space: pre-wrap !important;
      word-break: break-all !important;
    }

    textarea::placeholder {
      color: var(--text-sub) !important;
      opacity: 0.6 !important;
    }

    textarea:focus {
      background: #ffffff !important;
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 4px var(--primary-light) !important;
      transform: translateY(-1px) !important;
    }

    body.pink textarea:focus {
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.15) !important;
    }

    textarea[readonly] {
      cursor: default !important;
      background: rgba(255, 255, 255, 0.5) !important;
    }

    /* ================= 布局容器（移动端完美适配）================= */
    .code-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 16px !important;
      margin: 20px 0 !important;
      width: 100% !important;
    }

    /* 移动端强制单栏，无溢出 */
    @media (max-width: 768px) {
      .code-grid {
        grid-template-columns: 1fr !important;
        gap: 12px !important;
      }
      .upload-area {
        padding: 32px 16px !important;
      }
      .upload-title {
        font-size: 15px !important;
      }
    }

    /* ================= 信息卡片 ================= */
    .info-card {
      all: unset !important;
      display: flex !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      gap: 24px !important;
      width: 100% !important;
      box-sizing: border-box !important;
      background: var(--card-bg) !important;
      padding: 14px 16px !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      margin: 10px 0 !important;
      font-size: 14px !important;
    }

    .info-item strong {
      color: var(--primary) !important;
      font-size: 15px !important;
      font-weight: 600 !important;
    }

    /* ================= 按钮组 ================= */
    .btn-group {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 10px !important;
      justify-content: center !important;
      margin: 24px 0 !important;
      width: 100% !important;
    }

    /* ================= 标题修复 ================= */
    .section-title {
      margin: 0 0 12px 0 !important;
      text-align: left !important;
    }
  </style>
</head>
<body>
  <div id="content">
    <!-- 标题区 -->
    <div class="hero">
      <h1>JS / CSS 代码压缩工具</h1>
      <p>一键生成 .min 压缩文件，减小体积，提升加载速度</p>
    </div>

    <!-- 上传区域（彻底修复版，无双虚线） -->
    <div class="section">
      <h2 class="section-title">选择文件</h2>
      <label class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".js,.css">
        <div class="upload-title">点击选择 或 拖拽文件到此处</div>
        <div class="upload-desc">仅支持 .js / .css 格式</div>
      </label>
      <div class="info-card">
        <div class="info-item">
          当前文件：<strong id="fileName">未选择文件</strong>
        </div>
      </div>
    </div>

    <!-- 代码对比区 -->
    <div class="code-grid">
      <div class="section">
        <h2 class="section-title">原始代码</h2>
        <textarea id="originCode" readonly placeholder="上传文件后显示原始代码..."></textarea>
      </div>
      <div class="section">
        <h2 class="section-title">压缩后代码 (.min)</h2>
        <textarea id="minCode" readonly placeholder="压缩后显示结果..."></textarea>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="btn-group">
      <button id="minifyBtn" disabled>开始压缩</button>
      <button id="downloadBtn" disabled>下载 .min 文件</button>
      <button id="clearBtn">清空重置</button>
    </div>

    <!-- 压缩统计 -->
    <div class="info-card">
      <div class="info-item">
        压缩前：<strong id="sizeBefore">0 B</strong>
      </div>
      <div class="info-item">
        压缩后：<strong id="sizeAfter">0 B</strong>
      </div>
      <div class="info-item">
        压缩率：<strong id="compressRatio">0%</strong>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', initMinifyTool);

    function initMinifyTool() {
      // 元素获取
      const fileInput = document.getElementById('fileInput');
      const uploadArea = document.getElementById('uploadArea');
      const originCode = document.getElementById('originCode');
      const minCode = document.getElementById('minCode');
      const fileName = document.getElementById('fileName');
      const minifyBtn = document.getElementById('minifyBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const clearBtn = document.getElementById('clearBtn');
      const sizeBefore = document.getElementById('sizeBefore');
      const sizeAfter = document.getElementById('sizeAfter');
      const compressRatio = document.getElementById('compressRatio');

      // 全局状态
      let currentFile = null;
      let fileType = '';
      let minifiedResult = '';

      // ================= 压缩核心函数 =================
      function minifyJS(code) {
        return code
          .replace(/(?<!https?:)\/\/.*$/gm, '')
          .replace(/\/\*[\s\S]*?\*\//g, '')
          .replace(/\s+/g, ' ')
          .replace(/\s*([=+\-*/%()\[\]{};:,.<>?!&|^~])\s*/g, '$1')
          .trim();
      }

      function minifyCSS(code) {
        return code
          .replace(/\/\*[\s\S]*?\*\//g, '')
          .replace(/\s+/g, ' ')
          .replace(/\s*([{}:;+,>~()])\s*/g, '$1')
          .replace(/;}/g, '}')
          .trim();
      }

      // ================= 文件加载 =================
      function loadFile(file) {
        const isJS = file.name.endsWith('.js');
        const isCSS = file.name.endsWith('.css');
        if (!isJS && !isCSS) {
          alert('仅支持 .js 和 .css 格式文件');
          return;
        }

        currentFile = file;
        fileType = isJS ? 'js' : 'css';
        fileName.textContent = file.name;

        const reader = new FileReader();
        reader.onload = (e) => {
          const code = e.target.result;
          originCode.value = code;
          // 重置状态
          minCode.value = '';
          minifiedResult = '';
          minifyBtn.disabled = false;
          downloadBtn.disabled = true;
          // 更新大小
          sizeBefore.textContent = formatSize(code.length);
          sizeAfter.textContent = '0 B';
          compressRatio.textContent = '0%';
        };
        reader.readAsText(file, 'utf-8');
      }

      // 大小格式化
      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      // ================= 事件绑定 =================
      // 点击上传
      uploadArea.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) loadFile(file);
      });

      // 拖拽上传
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      });
      uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
      });
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file);
      });

      // 压缩按钮
      minifyBtn.addEventListener('click', () => {
        const code = originCode.value.trim();
        if (!code) {
          alert('请先上传文件');
          return;
        }
        // 执行压缩
        minifiedResult = fileType === 'css' ? minifyCSS(code) : minifyJS(code);
        minCode.value = minifiedResult;
        // 计算压缩率
        const before = code.length;
        const after = minifiedResult.length;
        const ratio = Math.round((1 - after / before) * 100);
        // 更新显示
        sizeBefore.textContent = formatSize(before);
        sizeAfter.textContent = formatSize(after);
        compressRatio.textContent = ratio + '%';
        // 启用下载
        downloadBtn.disabled = false;
      });

      // 下载按钮
      downloadBtn.addEventListener('click', () => {
        if (!minifiedResult || !currentFile) {
          alert('请先完成压缩');
          return;
        }
        // 生成文件名
        const suffix = fileType === 'css' ? '.min.css' : '.min.js';
        const dlName = currentFile.name.replace(/\.(js|css)$/i, suffix);
        // 下载
        const blob = new Blob([minifiedResult], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = dlName;
        a.click();
        URL.revokeObjectURL(url);
      });

      // 清空重置
      clearBtn.addEventListener('click', () => {
        originCode.value = '';
        minCode.value = '';
        fileName.textContent = '未选择文件';
        fileInput.value = '';
        currentFile = null;
        fileType = '';
        minifiedResult = '';
        minifyBtn.disabled = true;
        downloadBtn.disabled = true;
        sizeBefore.textContent = '0 B';
        sizeAfter.textContent = '0 B';
        compressRatio.textContent = '0%';
      });
    }
  </script>
</body>
</html>
