<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JS/CSS 压缩工具 | SHUOWEB</title>
  <!-- 引入SHUOWEB核心库 -->
  <script src="https://shuoweb.com/common.js" defer></script>
  <style>
    /* ==============================================
       核心：彻底隔离common.js全局样式污染
       根治布局错乱、双虚线的根源
    ============================================== */
    /* 重置所有自定义容器，干掉common.js强加的全局样式 */
    .upload-wrap,
    .code-grid,
    .code-block,
    .btn-wrap,
    .info-wrap,
    .upload-box {
      all: unset !important;
      display: block !important;
      box-sizing: border-box !important;
      box-shadow: none !important;
      border: none !important;
      border-radius: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
    }

    /* ==============================================
       上传区域（唯一一层虚线，绝对无叠加）
    ============================================== */
    .upload-box {
      display: block !important;
      width: 100% !important;
      border: 2px dashed var(--text-sub) !important;
      border-radius: var(--radius) !important;
      background: var(--card-bg) !important;
      padding: 40px 16px !important;
      margin: 12px 0 20px 0 !important;
      text-align: center !important;
      cursor: pointer !important;
      transition: var(--transition) !important;
      opacity: 0.5 !important;
    }
    .upload-box:hover,
    .upload-box.dragover {
      opacity: 1 !important;
      border-color: var(--primary) !important;
      background: var(--primary-light) !important;
      transform: scale(1.01) !important;
      box-shadow: 0 0 0 4px var(--primary-light) !important;
    }
    body.pink .upload-box:hover,
    body.pink .upload-box.dragover {
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.15) !important;
    }
    .upload-box input {
      display: none !important;
    }
    .upload-title {
      font-size: 16px !important;
      font-weight: 500 !important;
      color: var(--text-main) !important;
      margin: 0 0 6px 0 !important;
      line-height: 1.4 !important;
    }
    .upload-desc {
      font-size: 13px !important;
      color: var(--text-sub) !important;
      margin: 0 !important;
      line-height: 1.4 !important;
    }

    /* ==============================================
       代码对比网格布局（PC双栏，移动端单栏，绝对不乱）
    ============================================== */
    .code-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 20px !important;
      margin: 20px 0 !important;
      width: 100% !important;
    }
    .code-block {
      width: 100% !important;
    }
    .code-block h3 {
      font-size: 18px !important;
      font-weight: 700 !important;
      color: var(--text-main) !important;
      margin: 0 0 12px 0 !important;
      text-align: left !important;
      line-height: 1.4 !important;
    }
    /* 移动端强制单栏，无溢出 */
    @media (max-width: 768px) {
      .code-grid {
        grid-template-columns: 1fr !important;
        gap: 24px !important;
      }
      .upload-box {
        padding: 32px 16px !important;
      }
      .upload-title {
        font-size: 15px !important;
      }
    }

    /* ==============================================
       代码文本域（无样式冲突）
    ============================================== */
    textarea {
      all: unset !important;
      display: block !important;
      width: 100% !important;
      min-height: 220px !important;
      box-sizing: border-box !important;
      padding: 14px 16px !important;
      margin: 0 !important;
      resize: vertical !important;
      background: var(--card-bg) !important;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      font-family: Consolas, Monaco, monospace, '666font' !important;
      font-size: 14px !important;
      color: var(--text-main) !important;
      line-height: 1.6 !important;
      tab-size: 2 !important;
      transition: var(--transition) !important;
      white-space: pre-wrap !important;
      word-break: break-all !important;
    }
    textarea::placeholder {
      color: var(--text-sub) !important;
      opacity: 0.6 !important;
    }
    textarea:focus {
      background: #ffffff !important;
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 4px var(--primary-light) !important;
      transform: translateY(-1px) !important;
    }
    body.pink textarea:focus {
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.15) !important;
    }
    textarea[readonly] {
      cursor: default !important;
      background: rgba(255, 255, 255, 0.5) !important;
    }

    /* ==============================================
       按钮容器
    ============================================== */
    .btn-wrap {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 10px !important;
      justify-content: center !important;
      margin: 24px 0 !important;
      width: 100% !important;
    }

    /* ==============================================
       信息统计卡片
    ============================================== */
    .info-wrap {
      display: flex !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      gap: 24px !important;
      width: 100% !important;
      box-sizing: border-box !important;
      background: var(--card-bg) !important;
      padding: 14px 16px !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      margin: 10px 0 !important;
      font-size: 14px !important;
    }
    .info-item strong {
      color: var(--primary) !important;
      font-size: 15px !important;
      font-weight: 600 !important;
    }

    /* ==============================================
       标题修复
    ============================================== */
    .section-title {
      margin: 0 0 12px 0 !important;
      text-align: left !important;
    }
  </style>
</head>
<body>
  <!-- 严格遵循common.js布局规范，无多余嵌套 -->
  <div id="content">
    <!-- 标题区（复用common.js原生hero样式，无修改） -->
    <div class="hero">
      <h1>JS / CSS 代码压缩工具</h1>
      <p>安全删除注释 + 无损压缩，一键生成 .min 格式文件</p>
    </div>

    <!-- 上传区域 -->
    <div class="section">
      <h2 class="section-title">选择文件</h2>
      <label class="upload-box" id="uploadBox">
        <input type="file" id="fileInput" accept=".js,.css">
        <div class="upload-title">点击选择 或 拖拽文件到此处</div>
        <div class="upload-desc">仅支持 .js / .css 格式文件</div>
      </label>
      <div class="info-wrap">
        <div class="info-item">
          当前文件：<strong id="fileName">未选择文件</strong>
        </div>
      </div>
    </div>

    <!-- 代码对比区 -->
    <div class="code-grid">
      <div class="code-block">
        <h3>原始代码</h3>
        <textarea id="codeOriginal" readonly placeholder="上传文件后将显示原始代码..."></textarea>
      </div>
      <div class="code-block">
        <h3>压缩后代码 (.min)</h3>
        <textarea id="codeMin" readonly placeholder="压缩完成后将显示结果..."></textarea>
      </div>
    </div>

    <!-- 操作按钮区 -->
    <div class="btn-wrap">
      <button id="btnMinify" disabled>开始压缩</button>
      <button id="btnDownload" disabled>下载 .min 文件</button>
      <button id="btnClear">清空重置</button>
    </div>

    <!-- 压缩统计区 -->
    <div class="info-wrap">
      <div class="info-item">
        压缩前：<strong id="sizeBefore">0 B</strong>
      </div>
      <div class="info-item">
        压缩后：<strong id="sizeAfter">0 B</strong>
      </div>
      <div class="info-item">
        压缩率：<strong id="compressRatio">0%</strong>
      </div>
    </div>
  </div>

  <!-- 核心功能脚本 -->
  <script>
    document.addEventListener('DOMContentLoaded', initMinifyTool);

    function initMinifyTool() {
      // 元素获取
      const fileInput = document.getElementById('fileInput');
      const uploadBox = document.getElementById('uploadBox');
      const codeOriginal = document.getElementById('codeOriginal');
      const codeMin = document.getElementById('codeMin');
      const fileName = document.getElementById('fileName');
      const btnMinify = document.getElementById('btnMinify');
      const btnDownload = document.getElementById('btnDownload');
      const btnClear = document.getElementById('btnClear');
      const sizeBefore = document.getElementById('sizeBefore');
      const sizeAfter = document.getElementById('sizeAfter');
      const compressRatio = document.getElementById('compressRatio');

      // 全局状态
      let currentFile = null;
      let fileType = ''; // js / css
      let minifiedResult = '';

      // ==============================================
      // 1. 安全删除注释（不会把代码一起注释掉，无崩溃）
      // ==============================================
      function safeRemoveComments(code, type) {
        if (type === 'js') {
          // JS安全删注释：先删多行注释，再删单行，不误删字符串内的//
          return code
            // 删除多行注释 /* ... */
            .replace(/\/\*[\s\S]*?\*\//g, '')
            // 删除行首的单行注释
            .replace(/^\s*\/\/.*/gm, '')
            // 删除行尾的单行注释（不影响代码）
            .replace(/\s+\/\/.*/g, '')
            // 清理多余空行
            .replace(/\n\s*\n/g, '\n');
        } else {
          // CSS安全删注释
          return code.replace(/\/\*[\s\S]*?\*\//g, '');
        }
      }

      // ==============================================
      // 2. 无损压缩（先删注释再压缩，绝对安全）
      // ==============================================
      function safeMinify(code, type) {
        if (type === 'js') {
          return code
            // 合并多余空白符
            .replace(/\s+/g, ' ')
            // 移除符号前后多余空格
            .replace(/\s*([=+\-*/%()\[\]{};:,.<>?!&|^~])\s*/g, '$1')
            // 首尾去空格
            .trim();
        } else {
          return code
            // 合并多余空白符
            .replace(/\s+/g, ' ')
            // 移除符号前后多余空格
            .replace(/\s*([{}:;+,>~()])\s*/g, '$1')
            // 移除最后一个多余分号
            .replace(/;}/g, '}')
            // 首尾去空格
            .trim();
        }
      }

      // ==============================================
      // 文件大小格式化
      // ==============================================
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      // ==============================================
      // 加载文件
      // ==============================================
      function loadFile(file) {
        // 校验文件格式
        const isJS = file.name.toLowerCase().endsWith('.js');
        const isCSS = file.name.toLowerCase().endsWith('.css');
        if (!isJS && !isCSS) {
          alert('仅支持 .js 和 .css 格式的文件');
          return;
        }

        // 更新状态
        currentFile = file;
        fileType = isJS ? 'js' : 'css';
        fileName.textContent = file.name;

        // 读取文件内容
        const reader = new FileReader();
        reader.onload = (event) => {
          const code = event.target.result;
          codeOriginal.value = code;
          // 重置压缩状态
          codeMin.value = '';
          minifiedResult = '';
          btnMinify.disabled = false;
          btnDownload.disabled = true;
          // 更新原始大小
          sizeBefore.textContent = formatFileSize(code.length);
          sizeAfter.textContent = '0 B';
          compressRatio.textContent = '0%';
        };
        reader.readAsText(file, 'utf-8');
      }

      // ==============================================
      // 事件绑定
      // ==============================================
      // 点击选择文件
      uploadBox.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) loadFile(file);
      });

      // 拖拽上传
      uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.classList.add('dragover');
      });
      uploadBox.addEventListener('dragleave', () => {
        uploadBox.classList.remove('dragover');
      });
      uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file);
      });

      // 压缩按钮
      btnMinify.addEventListener('click', () => {
        const originalCode = codeOriginal.value.trim();
        if (!originalCode) {
          alert('请先上传文件');
          return;
        }

        // 先删注释，再压缩
        const codeWithoutComment = safeRemoveComments(originalCode, fileType);
        minifiedResult = safeMinify(codeWithoutComment, fileType);
        codeMin.value = minifiedResult;

        // 计算压缩数据
        const originalLength = originalCode.length;
        const minifiedLength = minifiedResult.length;
        const ratio = Math.round((1 - minifiedLength / originalLength) * 100);

        // 更新显示
        sizeBefore.textContent = formatFileSize(originalLength);
        sizeAfter.textContent = formatFileSize(minifiedLength);
        compressRatio.textContent = ratio + '%';

        // 启用下载按钮
        btnDownload.disabled = false;
      });

      // 下载按钮
      btnDownload.addEventListener('click', () => {
        if (!minifiedResult || !currentFile) {
          alert('请先完成压缩');
          return;
        }

        // 生成文件名
        const suffix = fileType === 'css' ? '.min.css' : '.min.js';
        const downloadFileName = currentFile.name.replace(/\.(js|css)$/i, suffix);

        // 创建下载链接
        const blob = new Blob([minifiedResult], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = downloadFileName;
        a.click();
        URL.revokeObjectURL(url);
      });

      // 清空重置按钮
      btnClear.addEventListener('click', () => {
        // 重置所有状态
        codeOriginal.value = '';
        codeMin.value = '';
        fileName.textContent = '未选择文件';
        fileInput.value = '';
        currentFile = null;
        fileType = '';
        minifiedResult = '';
        btnMinify.disabled = true;
        btnDownload.disabled = true;
        sizeBefore.textContent = '0 B';
        sizeAfter.textContent = '0 B';
        compressRatio.textContent = '0%';
      });
    }
  </script>
</body>
</html>
