<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>全文件代码压缩工具 | SHUOWEB</title>
  <!-- 引入SHUOWEB核心库 -->
  <script src="https://shuoweb.com/common.js" defer></script>
  <style>
    /* ==============================================
       核心：彻底隔离common.js全局样式污染
       根治布局错乱、双虚线的根源
    ============================================== */
    .upload-wrap,
    .code-grid,
    .code-block,
    .btn-wrap,
    .info-wrap,
    .upload-box,
    .mode-wrap {
      all: unset !important;
      display: block !important;
      box-sizing: border-box !important;
      box-shadow: none !important;
      border: none !important;
      border-radius: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
    }

    /* ==============================================
       处理模式选择
    ============================================== */
    .mode-wrap {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 8px !important;
      margin: 0 0 20px 0 !important;
      padding: 12px 16px !important;
      background: var(--card-bg) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      justify-content: center !important;
    }
    .mode-radio {
      display: none !important;
    }
    .mode-label {
      padding: 6px 14px !important;
      border-radius: 20px !important;
      background: rgba(255,255,255,0.1) !important;
      color: var(--text-main) !important;
      font-size: 13px !important;
      cursor: pointer !important;
      transition: var(--transition) !important;
    }
    .mode-radio:checked + .mode-label {
      background: var(--primary) !important;
      color: #fff !important;
    }

    /* ==============================================
       上传区域（唯一一层虚线，绝对无叠加）
    ============================================== */
    .upload-box {
      display: block !important;
      width: 100% !important;
      border: 2px dashed var(--text-sub) !important;
      border-radius: var(--radius) !important;
      background: var(--card-bg) !important;
      padding: 40px 16px !important;
      margin: 12px 0 20px 0 !important;
      text-align: center !important;
      cursor: pointer !important;
      transition: var(--transition) !important;
      opacity: 0.5 !important;
      /* 移动端点击区域放大 */
      min-height: 120px !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
    }
    .upload-box:hover,
    .upload-box.dragover {
      opacity: 1 !important;
      border-color: var(--primary) !important;
      background: var(--primary-light) !important;
      transform: scale(1.01) !important;
      box-shadow: 0 0 0 4px var(--primary-light) !important;
    }
    body.pink .upload-box:hover,
    body.pink .upload-box.dragover {
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.15) !important;
    }
    .upload-box input {
      /* 移动端兼容：不用display:none，用opacity:0铺满整个区域，保证点击有效 */
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      opacity: 0 !important;
      cursor: pointer !important;
    }
    .upload-title {
      font-size: 16px !important;
      font-weight: 500 !important;
      color: var(--text-main) !important;
      margin: 0 0 6px 0 !important;
      line-height: 1.4 !important;
      pointer-events: none !important;
    }
    .upload-desc {
      font-size: 13px !important;
      color: var(--text-sub) !important;
      margin: 0 !important;
      line-height: 1.4 !important;
      pointer-events: none !important;
    }

    /* ==============================================
       代码对比网格布局（PC双栏，移动端单栏，绝对不乱）
    ============================================== */
    .code-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 20px !important;
      margin: 20px 0 !important;
      width: 100% !important;
    }
    .code-block {
      width: 100% !important;
    }
    .code-block h3 {
      font-size: 18px !important;
      font-weight: 700 !important;
      color: var(--text-main) !important;
      margin: 0 0 12px 0 !important;
      text-align: left !important;
      line-height: 1.4 !important;
    }
    /* 移动端强制单栏，无溢出 */
    @media (max-width: 768px) {
      .code-grid {
        grid-template-columns: 1fr !important;
        gap: 24px !important;
      }
      .upload-box {
        padding: 32px 16px !important;
        min-height: 100px !important;
      }
      .upload-title {
        font-size: 15px !important;
      }
      .mode-label {
        font-size: 12px !important;
        padding: 5px 10px !important;
      }
    }

    /* ==============================================
       代码文本域（无样式冲突）
    ============================================== */
    textarea {
      all: unset !important;
      display: block !important;
      width: 100% !important;
      min-height: 220px !important;
      box-sizing: border-box !important;
      padding: 14px 16px !important;
      margin: 0 !important;
      resize: vertical !important;
      background: var(--card-bg) !important;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      font-family: Consolas, Monaco, monospace, '666font' !important;
      font-size: 14px !important;
      color: var(--text-main) !important;
      line-height: 1.6 !important;
      tab-size: 2 !important;
      transition: var(--transition) !important;
      white-space: pre-wrap !important;
      word-break: break-all !important;
    }
    textarea::placeholder {
      color: var(--text-sub) !important;
      opacity: 0.6 !important;
    }
    textarea:focus {
      background: #ffffff !important;
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 4px var(--primary-light) !important;
      transform: translateY(-1px) !important;
    }
    body.pink textarea:focus {
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.15) !important;
    }
    textarea[readonly] {
      cursor: default !important;
      background: rgba(255, 255, 255, 0.5) !important;
    }

    /* ==============================================
       按钮容器
    ============================================== */
    .btn-wrap {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 10px !important;
      justify-content: center !important;
      margin: 24px 0 !important;
      width: 100% !important;
    }
    .btn-wrap button {
      min-height: 44px !important;
      min-width: 120px !important;
      padding: 0 20px !important;
      font-size: 15px !important;
    }

    /* ==============================================
       信息统计卡片
    ============================================== */
    .info-wrap {
      display: flex !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      gap: 24px !important;
      width: 100% !important;
      box-sizing: border-box !important;
      background: var(--card-bg) !important;
      padding: 14px 16px !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      margin: 10px 0 !important;
      font-size: 14px !important;
    }
    .info-item strong {
      color: var(--primary) !important;
      font-size: 15px !important;
      font-weight: 600 !important;
    }

    /* ==============================================
       标题修复
    ============================================== */
    .section-title {
      margin: 0 0 12px 0 !important;
      text-align: left !important;
    }
  </style>
</head>
<body>
  <!-- 严格遵循common.js布局规范，无多余嵌套 -->
  <div id="content">
    <!-- 标题区（复用common.js原生hero样式，无修改） -->
    <div class="hero">
      <h1>全文件代码压缩工具</h1>
      <p>支持所有文本文件，安全去注释、无损压缩，一键生成精简版文件</p>
    </div>

    <!-- 上传区域 -->
    <div class="section">
      <h2 class="section-title">选择文件</h2>
      <label class="upload-box" id="uploadBox">
        <!-- 核心修复：accept="*/*" 放开所有文件，移动端100%能选到 -->
        <input type="file" id="fileInput" accept="*/*">
        <div class="upload-title">点击选择 或 拖拽文件到此处</div>
        <div class="upload-desc">支持所有文本文件（JS/CSS/HTML/JSON/TXT等）</div>
      </label>
      <div class="info-wrap">
        <div class="info-item">
          当前文件：<strong id="fileName">未选择文件</strong>
        </div>
        <div class="info-item">
          文件类型：<strong id="fileType">--</strong>
        </div>
      </div>
    </div>

    <!-- 处理模式选择 -->
    <div class="section">
      <h2 class="section-title">处理模式</h2>
      <div class="mode-wrap">
        <input type="radio" name="mode" id="mode1" class="mode-radio" value="full" checked>
        <label for="mode1" class="mode-label">去注释 + 压缩</label>

        <input type="radio" name="mode" id="mode2" class="mode-radio" value="comment">
        <label for="mode2" class="mode-label">仅去注释</label>

        <input type="radio" name="mode" id="mode3" class="mode-radio" value="format">
        <label for="mode3" class="mode-label">仅去空行/多余空格</label>
      </div>
    </div>

    <!-- 代码对比区 -->
    <div class="code-grid">
      <div class="code-block">
        <h3>原始代码</h3>
        <textarea id="codeOriginal" readonly placeholder="上传文件后将显示原始内容..."></textarea>
      </div>
      <div class="code-block">
        <h3>处理后代码</h3>
        <textarea id="codeResult" readonly placeholder="处理完成后将显示结果..."></textarea>
      </div>
    </div>

    <!-- 操作按钮区 -->
    <div class="btn-wrap">
      <button id="btnProcess" disabled>开始处理</button>
      <button id="btnDownload" disabled>下载处理后文件</button>
      <button id="btnClear">清空重置</button>
    </div>

    <!-- 处理统计区 -->
    <div class="info-wrap">
      <div class="info-item">
        原始大小：<strong id="sizeBefore">0 B</strong>
      </div>
      <div class="info-item">
        处理后：<strong id="sizeAfter">0 B</strong>
      </div>
      <div class="info-item">
        精简率：<strong id="compressRatio">0%</strong>
      </div>
    </div>
  </div>

  <!-- 核心功能脚本 -->
  <script>
    document.addEventListener('DOMContentLoaded', initTool);

    function initTool() {
      // 元素获取
      const fileInput = document.getElementById('fileInput');
      const uploadBox = document.getElementById('uploadBox');
      const codeOriginal = document.getElementById('codeOriginal');
      const codeResult = document.getElementById('codeResult');
      const fileName = document.getElementById('fileName');
      const fileType = document.getElementById('fileType');
      const btnProcess = document.getElementById('btnProcess');
      const btnDownload = document.getElementById('btnDownload');
      const btnClear = document.getElementById('btnClear');
      const sizeBefore = document.getElementById('sizeBefore');
      const sizeAfter = document.getElementById('sizeAfter');
      const compressRatio = document.getElementById('compressRatio');
      const modeRadios = document.querySelectorAll('input[name="mode"]');

      // 全局状态
      let currentFile = null;
      let fileExt = ''; // 文件后缀
      let fileMime = ''; // 文件MIME类型
      let isTextFile = true; // 是否为可处理的文本文件
      let processedResult = ''; // 处理后的结果

      // ==============================================
      // 1. 核心处理函数：全文件类型适配
      // ==============================================
      // 安全删除注释（支持JS/CSS/HTML/XML等）
      function safeRemoveComments(code, ext) {
        switch (ext) {
          case 'js':
          case 'jsx':
          case 'ts':
          case 'java':
          case 'php':
          case 'py':
            return code
              // 删除多行注释 /* ... */
              .replace(/\/\*[\s\S]*?\*\//g, '')
              // 删除行首单行注释
              .replace(/^\s*\/\/.*/gm, '')
              // 删除行尾单行注释（不影响字符串内的//）
              .replace(/\s+\/\/.*/g, '')
              // 清理多余空行
              .replace(/\n\s*\n/g, '\n');
          
          case 'css':
          case 'scss':
          case 'less':
            return code
              .replace(/\/\*[\s\S]*?\*\//g, '')
              .replace(/\n\s*\n/g, '\n');
          
          case 'html':
          case 'htm':
          case 'xml':
          case 'svg':
            return code
              // 删除HTML注释 <!-- ... -->
              .replace(/<!--[\s\S]*?-->/g, '')
              // 清理多余空行
              .replace(/\n\s*\n/g, '\n');
          
          case 'json':
            return code; // JSON不删注释，避免格式错误
          
          default:
            // 通用文本文件，仅删空行
            return code.replace(/\n\s*\n/g, '\n');
        }
      }

      // 无损压缩（适配不同文件类型）
      function safeMinify(code, ext) {
        switch (ext) {
          case 'js':
          case 'jsx':
          case 'ts':
          case 'java':
          case 'php':
            return code
              .replace(/\s+/g, ' ')
              .replace(/\s*([=+\-*/%()\[\]{};:,.<>?!&|^~])\s*/g, '$1')
              .trim();
          
          case 'css':
          case 'scss':
          case 'less':
            return code
              .replace(/\s+/g, ' ')
              .replace(/\s*([{}:;+,>~()])\s*/g, '$1')
              .replace(/;}/g, '}')
              .trim();
          
          case 'html':
          case 'htm':
          case 'xml':
          case 'svg':
            return code
              .replace(/\s+/g, ' ')
              .replace(/\s*([<>])\s*/g, '$1')
              .trim();
          
          case 'json':
            try {
              // JSON压缩：格式化后再压缩，保证格式正确
              return JSON.stringify(JSON.parse(code));
            } catch (e) {
              return code;
            }
          
          default:
            // 通用文本：仅合并多余空格
            return code.replace(/\s+/g, ' ').trim();
        }
      }

      // 仅去空行和多余空格
      function removeEmptyLine(code) {
        return code
          .replace(/\s+/g, ' ')
          .replace(/\n\s*\n/g, '\n')
          .trim();
      }

      // ==============================================
      // 2. 工具函数
      // ==============================================
      // 文件大小格式化
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      // 获取文件后缀和类型
      function getFileInfo(file) {
        const name = file.name;
        const ext = name.split('.').pop().toLowerCase();
        const mime = file.type || '';
        // 判断是否为文本文件
        const textExts = ['js','jsx','ts','css','scss','less','html','htm','xml','svg','json','txt','md','php','java','py','c','cpp','go','rs','vue','react'];
        const isText = textExts.includes(ext) || mime.startsWith('text/') || mime.includes('javascript') || mime.includes('json');
        return { ext, mime, isText };
      }

      // 获取当前选中的处理模式
      function getCurrentMode() {
        const checked = document.querySelector('input[name="mode"]:checked');
        return checked ? checked.value : 'full';
      }

      // ==============================================
      // 3. 文件加载处理
      // ==============================================
      function loadFile(file) {
        // 更新文件信息
        const fileInfo = getFileInfo(file);
        currentFile = file;
        fileExt = fileInfo.ext;
        fileMime = fileInfo.mime;
        isTextFile = fileInfo.isText;

        // 更新UI
        fileName.textContent = file.name;
        fileType.textContent = `.${fileExt} ${isTextFile ? '(可处理)' : '(二进制文件，仅支持下载)'}`;

        // 读取文件内容
        const reader = new FileReader();
        reader.onload = (event) => {
          const content = event.target.result;
          codeOriginal.value = content;
          
          // 重置处理状态
          codeResult.value = '';
          processedResult = '';
          btnDownload.disabled = true;
          
          // 二进制文件：禁用处理按钮，直接启用下载
          if (!isTextFile) {
            btnProcess.disabled = true;
            processedResult = content;
            btnDownload.disabled = false;
            sizeBefore.textContent = formatFileSize(content.length);
            sizeAfter.textContent = formatFileSize(content.length);
            compressRatio.textContent = '0%';
            codeResult.value = '⚠️ 该文件为二进制文件，不支持代码处理，可直接下载原文件';
          } else {
            // 文本文件：启用处理按钮
            btnProcess.disabled = false;
            sizeBefore.textContent = formatFileSize(content.length);
            sizeAfter.textContent = '0 B';
            compressRatio.textContent = '0%';
          }
        };

        // 文本文件用utf-8读取，二进制文件用原始数据
        if (isTextFile) {
          reader.readAsText(file, 'utf-8');
        } else {
          reader.readAsBinaryString(file);
        }
      }

      // ==============================================
      // 4. 事件绑定
      // ==============================================
      // 文件选择
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) loadFile(file);
      });

      // 拖拽上传
      uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.classList.add('dragover');
      });
      uploadBox.addEventListener('dragleave', () => {
        uploadBox.classList.remove('dragover');
      });
      uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file);
      });

      // 处理按钮
      btnProcess.addEventListener('click', () => {
        const originalCode = codeOriginal.value.trim();
        if (!originalCode || !isTextFile) {
          alert('请先上传可处理的文本文件');
          return;
        }

        // 获取处理模式
        const mode = getCurrentMode();
        let result = originalCode;

        // 按模式处理
        switch (mode) {
          case 'full':
            result = safeRemoveComments(result, fileExt);
            result = safeMinify(result, fileExt);
            break;
          case 'comment':
            result = safeRemoveComments(result, fileExt);
            break;
          case 'format':
            result = removeEmptyLine(result);
            break;
        }

        // 更新结果
        processedResult = result;
        codeResult.value = result;

        // 计算统计数据
        const originalLength = originalCode.length;
        const resultLength = result.length;
        const ratio = Math.round((1 - resultLength / originalLength) * 100);

        // 更新UI
        sizeBefore.textContent = formatFileSize(originalLength);
        sizeAfter.textContent = formatFileSize(resultLength);
        compressRatio.textContent = ratio + '%';

        // 启用下载按钮
        btnDownload.disabled = false;
      });

      // 下载按钮
      btnDownload.addEventListener('click', () => {
        if (!processedResult || !currentFile) {
          alert('请先完成文件处理');
          return;
        }

        // 生成下载文件名
        const name = currentFile.name;
        let downloadName = name;
        // 文本文件自动加.min后缀
        if (isTextFile) {
          const nameWithoutExt = name.substring(0, name.lastIndexOf('.'));
          downloadName = `${nameWithoutExt}.min.${fileExt}`;
        }

        // 创建下载链接
        const blob = new Blob([processedResult], { type: fileMime || 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = downloadName;
        a.click();
        URL.revokeObjectURL(url);
      });

      // 清空重置按钮
      btnClear.addEventListener('click', () => {
        // 重置所有状态
        codeOriginal.value = '';
        codeResult.value = '';
        fileName.textContent = '未选择文件';
        fileType.textContent = '--';
        fileInput.value = '';
        currentFile = null;
        fileExt = '';
        fileMime = '';
        isTextFile = true;
        processedResult = '';
        btnProcess.disabled = true;
        btnDownload.disabled = true;
        sizeBefore.textContent = '0 B';
        sizeAfter.textContent = '0 B';
        compressRatio.textContent = '0%';
        // 重置模式为默认
        document.getElementById('mode1').checked = true;
      });
    }
  </script>
</body>
</html>
