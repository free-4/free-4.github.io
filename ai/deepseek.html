            abortController = new AbortController();

            try {
                const body = {
                    model: currentModel,
                    messages: messages,
                    stream: true,
                    temperature: settings.temperature,
                    top_p: settings.topP,
                    max_tokens: settings.maxTokens,
                    frequency_penalty: settings.freqPenalty,
                    presence_penalty: settings.presPenalty,
                };

                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + key,
                    },
                    body: JSON.stringify(body),
                    signal: abortController.signal,
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error?.message || 'HTTP ' + res.status);
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                contentEl.innerHTML = '<span class="cursor"></span>';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const raw = decoder.decode(value, { stream: true });
                    const lines = raw.split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            const delta = json.choices?.[0]?.delta?.content || '';
                            if (delta) {
                                currentFullText += delta;
                                contentEl.innerHTML = marked.parse(currentFullText) + '<span class="cursor"></span>';
                                scrollBottom();
                            }
                        } catch (e) {}
                    }
                }

                contentEl.innerHTML = marked.parse(currentFullText);
                chatHistory.push({ role: 'assistant', content: currentFullText });
                saveHistory();

                const streamingWrap = document.querySelector('[data-role="assistant-streaming"]');
                if (streamingWrap) {
                    streamingWrap.removeAttribute('data-role');
                    streamingWrap.setAttribute('data-role', 'assistant');
                    const msgBody = streamingWrap.querySelector('.msg-body');
                    if (msgBody && !msgBody.querySelector('.msg-actions')) {
                        const actionsDiv = document.createElement('div');
                        actionsDiv.className = 'msg-actions';
                        actionsDiv.innerHTML = '' +
                            '<button class="msg-action-btn retry-btn" onclick="retryFromHere(this)">重新生成</button>' +
                            '<button class="msg-action-btn" onclick="copyMessage(this)">复制回复</button>';
                        msgBody.appendChild(actionsDiv);
                    }
                }

            } catch (err) {
                if (err.name === 'AbortError') {
                    if (currentFullText) {
                        contentEl.innerHTML = marked.parse(currentFullText);
                        chatHistory.push({ role: 'assistant', content: currentFullText });
                        saveHistory();
                    } else {
                        const shell = document.querySelector('[data-role="assistant-streaming"]');
                        if (shell) shell.remove();
                    }
                } else {
                    contentEl.innerHTML = marked.parse('**请求失败：** ' + escHtml(err.message || '未知错误'));
                }
            } finally {
                streaming = false;
                abortController = null;
                currentAiShellId = null;
                currentFullText = '';
                btn.disabled = false;
                stopBtn.classList.remove('visible');
                if (isMobile) document.getElementById('mobileStopBtn').style.display = 'none';
                if (!isMobile) document.getElementById('userInput').focus();
                scrollBottom();
            }
        }

        /* ================================================================
           复制消息内容
           ================================================================ */
        function copyMessage(btn) {
            const msgContent = btn.closest('.msg-body')?.querySelector('.msg-content');
            if (!msgContent) return;
            const text = msgContent.innerText || msgContent.textContent || '';
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '已复制';
                setTimeout(() => { btn.textContent = '复制回复'; }, 1500);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); } catch (e) {}
                document.body.removeChild(ta);
                btn.textContent = '已复制';
                setTimeout(() => { btn.textContent = '复制回复'; }, 1500);
            });
        }
