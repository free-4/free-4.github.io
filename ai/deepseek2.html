<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 对话 · 增强版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --blue: #1a56f0; --blue-dim: #1440cc; --blue-tint: #eef2ff;
            --surface: #ffffff; --bg: #f5f6f8; --sidebar-bg: #fafafa;
            --border: #e5e7eb; --text: #111827; --text-2: #4b5563; --text-3: #9ca3af;
            --shadow: 0 1px 4px rgba(0,0,0,.06);
            --mono: 'DM Mono','Fira Code',monospace;
            --sans: 'DM Sans',sans-serif;
            --danger: #dc2626; --danger-tint: #fef2f2;
            --green: #16a34a; --green-tint: #f0fdf4;
            --warning: #d97706; --warning-tint: #fffbeb;
            --radius-sm: 6px; --radius: 8px; --radius-lg: 13px;
            --transition-base: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --blue: #4f80ff; --blue-dim: #3a66e0; --blue-tint: #1a2540;
            --surface: #1c1d21; --bg: #141518; --sidebar-bg: #18191d;
            --border: #2a2b30; --text: #e8e9ed; --text-2: #9ca3af; --text-3: #6b7280;
            --shadow: 0 1px 4px rgba(0,0,0,.3);
            --danger: #f87171; --danger-tint: #1f1515;
            --green: #4ade80; --green-tint: #0f1f15;
            --warning: #fbbf24; --warning-tint: #1f180d;
        }
        [data-theme="navy"] {
            --blue: #60a5fa; --blue-dim: #3b82f6; --blue-tint: #1e2d4a;
            --surface: #0f1729; --bg: #0a1020; --sidebar-bg: #0d1525;
            --border: #1e2d4a; --text: #e2e8f0; --text-2: #94a3b8; --text-3: #64748b;
            --shadow: 0 1px 4px rgba(0,0,0,.4);
            --danger: #f87171; --danger-tint: #1a1218;
            --green: #4ade80; --green-tint: #0d1a14;
            --warning: #fbbf24; --warning-tint: #1a150d;
        }
        [data-theme="warm"] {
            --blue: #b45309; --blue-dim: #92400e; --blue-tint: #fef3c7;
            --surface: #fffbf4; --bg: #fdf6ec; --sidebar-bg: #fef9f2;
            --border: #e8d5b0; --text: #1c1408; --text-2: #78612a; --text-3: #a08c5a;
            --shadow: 0 1px 4px rgba(0,0,0,.06);
            --danger: #dc2626; --danger-tint: #fef2f2;
            --green: #16a34a; --green-tint: #f0fdf4;
            --warning: #d97706; --warning-tint: #fffbeb;
        }
        [data-theme="forest"] {
            --blue: #16a34a; --blue-dim: #15803d; --blue-tint: #dcfce7;
            --surface: #f0fdf4; --bg: #e8f5ed; --sidebar-bg: #f0fdf4;
            --border: #bbf7d0; --text: #052e16; --text-2: #166534; --text-3: #4ade80;
            --shadow: 0 1px 4px rgba(0,0,0,.06);
            --danger: #dc2626; --danger-tint: #fef2f2;
            --green: #16a34a; --green-tint: #dcfce7;
            --warning: #d97706; --warning-tint: #fffbeb;
        }
        [data-theme="rose"] {
            --blue: #e11d48; --blue-dim: #be123c; --blue-tint: #ffe4e6;
            --surface: #fff5f6; --bg: #ffeef0; --sidebar-bg: #fff5f6;
            --border: #fecdd3; --text: #1c0408; --text-2: #9f1239; --text-3: #fb7185;
            --shadow: 0 1px 4px rgba(0,0,0,.06);
            --danger: #be123c; --danger-tint: #ffe4e6;
            --green: #16a34a; --green-tint: #f0fdf4;
            --warning: #d97706; --warning-tint: #fffbeb;
        }

        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html,body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow: hidden; transition: background var(--transition-base),color var(--transition-base); font-size: 15px; }

        .shell { display: flex; height: 100dvh; width: 100%; }

        /* ── Sidebar ── */
        .sidebar {
            width: 272px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.26s cubic-bezier(.4,0,.2,1),background var(--transition-base),border-color var(--transition-base);
            z-index: 20; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
        }
        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .sidebar-brand {
            padding: 18px 16px 12px; display: flex; align-items: center; gap: 10px;
            flex-shrink: 0; position: sticky; top: 0; background: var(--sidebar-bg); z-index: 2;
            transition: background var(--transition-base);
        }
        .brand-icon {
            width: 30px; height: 30px; background: var(--blue); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background var(--transition-base);
        }
        .brand-name { font-size: 14.5px; font-weight: 600; letter-spacing: -.02em; color: var(--text); transition: color var(--transition-base); }

        .sidebar-section {
            padding: 10px 16px 4px; font-size: 9.5px; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase; color: var(--text-3);
            transition: color var(--transition-base); flex-shrink: 0; margin-top: 2px;
        }

        .model-list { padding: 3px 8px 8px; display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
        .model-item {
            padding: 9px 10px; border-radius: 7px; cursor: pointer; border: none;
            background: transparent; text-align: left; width: 100%;
            font-family: var(--sans); transition: background var(--transition-base);
        }
        .model-item:hover { background: var(--border); }
        .model-item.active { background: var(--blue-tint); }
        .model-item-name { font-size: 13px; font-weight: 500; display: block; color: var(--text); transition: color var(--transition-base); }
        .model-item.active .model-item-name { color: var(--blue); }
        .model-item-desc { font-size: 10.5px; color: var(--text-3); display: block; margin-top: 1px; transition: color var(--transition-base); }

        .theme-list { padding: 3px 8px 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; flex-shrink: 0; }
        .theme-item {
            padding: 7px 8px; border-radius: 7px; cursor: pointer; border: 1.5px solid transparent;
            background: transparent; text-align: left; font-family: var(--sans); font-size: 11.5px;
            font-weight: 500; color: var(--text-2); display: flex; align-items: center; gap: 6px;
            transition: background var(--transition-base),border-color var(--transition-base),color var(--transition-base);
        }
        .theme-item:hover { background: var(--border); }
        .theme-item.active { border-color: var(--blue); color: var(--blue); background: var(--blue-tint); }
        .theme-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,.12); }

        .divider { height: 1px; background: var(--border); margin: 6px 10px; flex-shrink: 0; transition: background var(--transition-base); }

        /* Collapse panels */
        .collapse-toggle {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; cursor: pointer; user-select: none; flex-shrink: 0;
            border: none; background: transparent; width: 100%; font-family: var(--sans);
            color: var(--text-2); font-size: 11px; font-weight: 600; letter-spacing: .03em;
            transition: background var(--transition-base);
        }
        .collapse-toggle:hover { background: var(--border); }
        .collapse-arrow { width: 16px; height: 16px; transition: transform var(--transition-base); color: var(--text-3); flex-shrink: 0; }
        .collapse-toggle.open .collapse-arrow { transform: rotate(180deg); }
        .collapse-content { overflow: hidden; max-height: 0; transition: max-height 0.3s cubic-bezier(.4,0,.2,1); flex-shrink: 0; }
        .collapse-content.open { max-height: 900px; }
        .collapse-inner { padding: 4px 14px 10px; }

        /* Settings */
        .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
        .setting-label { font-size: 11px; font-weight: 500; color: var(--text-2); white-space: nowrap; transition: color var(--transition-base); }
        .setting-value { font-size: 10px; font-family: var(--mono); color: var(--text-3); min-width: 32px; text-align: right; transition: color var(--transition-base); }
        .setting-slider {
            flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px;
            background: var(--border); outline: none; cursor: pointer; transition: background var(--transition-base);
        }
        .setting-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: var(--blue); cursor: pointer; border: 2px solid var(--surface);
            box-shadow: 0 1px 3px rgba(0,0,0,.15); transition: background var(--transition-base),transform 0.1s;
        }
        .setting-slider::-webkit-slider-thumb:active { transform: scale(1.15); }
        .setting-input-sm {
            width: 52px; padding: 4px 6px; font-size: 11px; font-family: var(--mono);
            border: 1px solid var(--border); border-radius: 5px; background: var(--surface);
            color: var(--text); outline: none; text-align: center;
            transition: border-color var(--transition-base),box-shadow var(--transition-base),background var(--transition-base),color var(--transition-base);
        }
        .setting-input-sm:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(79,128,255,.1); }
        .sys-prompt-area {
            width: 100%; padding: 7px 9px; font-size: 11px; font-family: var(--sans);
            border: 1px solid var(--border); border-radius: 7px; background: var(--surface);
            color: var(--text); outline: none; resize: vertical; min-height: 48px; max-height: 100px;
            transition: border-color var(--transition-base),box-shadow var(--transition-base),background var(--transition-base),color var(--transition-base); line-height: 1.5;
        }
        .sys-prompt-area:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,128,255,.1); }

        /* ── File Manager ── */
        .file-upload-btns { display: flex; gap: 5px; padding: 2px 0 8px; }
        .file-search { margin-bottom: 6px; position: relative; }
        .file-search input {
            width: 100%; padding: 6px 8px 6px 28px; font-size: 11px; font-family: var(--sans);
            border: 1px solid var(--border); border-radius: 7px; background: var(--surface);
            color: var(--text); outline: none; transition: border-color var(--transition-base),box-shadow var(--transition-base);
        }
        .file-search input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(79,128,255,.1); }
        .file-search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-3); }
        .file-tree {
            max-height: 300px; overflow-y: auto; overflow-x: hidden;
            border: 1px solid var(--border); border-radius: 7px; background: var(--bg);
            margin-bottom: 6px; transition: background var(--transition-base),border-color var(--transition-base);
        }
        .file-tree::-webkit-scrollbar { width: 2px; }
        .file-tree::-webkit-scrollbar-track { background: transparent; }
        .file-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }
        .file-item {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 8px; cursor: pointer; border-radius: 5px;
            margin: 2px 3px; transition: background var(--transition-base), opacity 0.15s;
            font-size: 11px; color: var(--text); user-select: none;
        }
        .file-item:hover { background: var(--border); }
        .file-item:not(.active) { opacity: 0.45; }
        .file-item.active .file-icon { color: var(--blue); }
        .file-icon { flex-shrink: 0; color: var(--text-3); transition: color 0.15s; }
        .file-name {
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            font-family: var(--mono); font-size: 10.5px; transition: color 0.15s;
        }
        .file-size { font-size: 9.5px; color: var(--text-3); font-family: var(--mono); flex-shrink: 0; }
        .file-del {
            flex-shrink: 0; width: 16px; height: 16px; border: none; background: transparent;
            color: var(--text-3); cursor: pointer; display: flex; align-items: center;
            justify-content: center; border-radius: 3px; opacity: 0;
            transition: opacity var(--transition-base),color var(--transition-base),background var(--transition-base); padding: 0;
        }
        .file-item:hover .file-del { opacity: 1; }
        .file-del:hover { color: var(--danger); background: var(--danger-tint); }
        .file-dir {
            display: flex; align-items: center; gap: 6px; padding: 4px 8px;
            margin: 1px 3px; font-size: 10.5px; font-weight: 600;
            color: var(--text-2); pointer-events: none; transition: color var(--transition-base);
        }
        .file-dir-icon { color: var(--warning); flex-shrink: 0; }
        .file-empty {
            padding: 18px 12px; font-size: 11px; color: var(--text-3);
            text-align: center; line-height: 1.6;
        }
        .file-stats {
            font-size: 9.5px; font-family: var(--mono); color: var(--text-3);
            text-align: center; margin-bottom: 5px; transition: color var(--transition-base);
        }
        .file-stats.warn { color: var(--warning); }

        /* Sidebar footer */
        .sidebar-footer {
            margin-top: auto; padding: 10px 10px 14px; flex-shrink: 0;
            position: sticky; bottom: 0; background: var(--sidebar-bg); z-index: 2;
            transition: background var(--transition-base);
        }
        .field-label {
            display: block; font-size: 9.5px; font-weight: 700; color: var(--text-3);
            margin-bottom: 5px; letter-spacing: .08em; text-transform: uppercase; transition: color var(--transition-base);
        }
        .field-input {
            width: 100%; padding: 7px 9px; font-size: 12px; font-family: var(--mono);
            border: 1px solid var(--border); border-radius: 7px; background: var(--surface);
            color: var(--text); outline: none;
            transition: border-color var(--transition-base),box-shadow var(--transition-base),background var(--transition-base),color var(--transition-base);
        }
        .field-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,128,255,.13); }
        .mem-actions { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
        .small-btn {
            flex: 1; padding: 6px 0; font-size: 11px; font-weight: 500;
            font-family: var(--sans); border: 1px solid var(--border); border-radius: 6px;
            background: var(--surface); color: var(--text-2); cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            transition: background var(--transition-base),color var(--transition-base),border-color var(--transition-base); white-space: nowrap; min-width: 42px;
        }
        .small-btn:hover { background: var(--blue-tint); color: var(--blue); border-color: var(--blue); }
        .small-btn.danger:hover { background: var(--danger-tint); color: var(--danger); border-color: var(--danger); }
        .small-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
        .small-btn.primary:hover { background: var(--blue-dim); border-color: var(--blue-dim); color: #fff; }
        .mem-count { font-size: 10.5px; color: var(--text-3); text-align: center; margin-top: 5px; transition: color var(--transition-base); }

        /* ── Main ── */
        .main {
            flex: 1; display: flex; flex-direction: column; min-width: 0;
            background: var(--surface); transition: background var(--transition-base); position: relative;
        }
        .topbar {
            display: none; align-items: center; gap: 10px; padding: 0 14px; height: 52px;
            border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface);
            transition: background var(--transition-base),border-color var(--transition-base);
        }
        .topbar-title { font-size: 14px; font-weight: 600; flex: 1; letter-spacing: -.02em; color: var(--text); transition: color var(--transition-base); }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 8px; border: none; background: transparent;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--text-2); transition: background var(--transition-base),color var(--transition-base); flex-shrink: 0;
        }
        .icon-btn:hover,.icon-btn:active { background: var(--bg); }
        .icon-btn.danger { color: var(--danger); }

        /* ── Messages ── */
        .messages {
            flex: 1; overflow-y: auto; padding: 28px 0 8px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .message-wrap { max-width: 760px; margin: 0 auto; padding: 0 28px; }
        .message {
            display: flex; gap: 12px; margin-bottom: 24px;
            animation: msgIn 0.28s ease forwards; opacity: 0; transform: translateY(6px);
        }
        @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }
        .msg-avatar {
            width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; margin-top: 2px;
            transition: background var(--transition-base);
        }
        .ai-avatar { background: var(--blue); }
        .user-avatar { background: var(--text-2); }
        .msg-body { flex: 1; min-width: 0; }
        .msg-meta { display: flex; align-items: baseline; gap: 7px; margin-bottom: 5px; }
        .msg-role { font-size: 10.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); transition: color var(--transition-base); }
        .msg-time { font-size: 9.5px; font-family: var(--mono); color: var(--text-3); opacity: .7; transition: color var(--transition-base); }
        .msg-content { font-size: 14.5px; line-height: 1.76; color: var(--text); transition: color var(--transition-base); }
        .message.user .msg-content {
            background: var(--blue-tint); border: 1px solid color-mix(in srgb,var(--blue) 20%,transparent);
            border-radius: 3px 12px 12px 12px; padding: 10px 14px;
            display: inline-block; max-width: 100%; white-space: pre-wrap; word-break: break-word;
        }

        /* Token info */
        .token-info {
            margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap;
            font-size: 9.5px; font-family: var(--mono); color: var(--text-3);
            opacity: .8; transition: color var(--transition-base);
        }
        .token-info span { display: flex; align-items: center; gap: 3px; }
        .token-info svg { flex-shrink: 0; }

        /* Message actions */
        .msg-actions {
            display: flex; gap: 4px; margin-top: 6px;
            opacity: 0; transition: opacity 0.2s; flex-wrap: wrap;
        }
        .message-wrap:hover .msg-actions,
        .message-wrap[data-role="assistant-streaming"] .msg-actions { opacity: 1; }
        .msg-action-btn {
            padding: 3px 8px; font-size: 10px; font-family: var(--sans);
            border: 1px solid var(--border); border-radius: 4px; background: var(--surface);
            color: var(--text-3); cursor: pointer; transition: all var(--transition-base); letter-spacing: .02em;
            display: flex; align-items: center; gap: 3px;
        }
        .msg-action-btn:hover { background: var(--blue-tint); color: var(--blue); border-color: var(--blue); }
        .msg-action-btn.retry-btn:hover { background: var(--green-tint); color: var(--green); border-color: var(--green); }
        .msg-action-btn.apply-btn:hover { background: var(--blue-tint); color: var(--blue); border-color: var(--blue); }

        /* Markdown */
        .msg-content p { margin-bottom: 9px; }
        .msg-content p:last-child { margin-bottom: 0; }
        .msg-content h1,.msg-content h2,.msg-content h3,.msg-content h4 { font-weight: 600; margin: 16px 0 6px; line-height: 1.3; letter-spacing: -.01em; }
        .msg-content h1 { font-size: 1.28em; }
        .msg-content h2 { font-size: 1.13em; }
        .msg-content h3 { font-size: 1.01em; }
        .msg-content ul,.msg-content ol { padding-left: 1.4em; margin: 6px 0 8px; }
        .msg-content li { margin-bottom: 3px; }
        .msg-content blockquote { border-left: 3px solid var(--blue); padding: 7px 13px; margin: 9px 0; background: var(--blue-tint); border-radius: 0 6px 6px 0; color: var(--text-2); font-style: italic; transition: background var(--transition-base); }
        .msg-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
        .msg-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: .9em; display: block; overflow-x: auto; border-radius: 6px; }
        .msg-content th,.msg-content td { border: 1px solid var(--border); padding: 7px 11px; text-align: left; }
        .msg-content th { background: var(--bg); font-weight: 600; font-size: .87em; transition: background var(--transition-base); }
        .msg-content a { color: var(--blue); text-decoration: underline; text-underline-offset: 2px; }
        .msg-content strong { font-weight: 600; }
        .msg-content :not(pre)>code { font-family: var(--mono); font-size: .84em; background: var(--bg); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; color: var(--blue); transition: background var(--transition-base); word-break: break-all; }

        /* Code blocks */
        .code-block { margin: 12px 0; border-radius: 8px; overflow: hidden; border: 1px solid #2d2f36; font-size: 13px; background: #161820; position: relative; }
        .code-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: #1c1e26; border-bottom: 1px solid #2d2f36; }
        .code-lang { font-family: var(--mono); font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: .07em; }
        .copy-btn { background: transparent; border: 1px solid #3a3c46; color: #999; font-family: var(--sans); font-size: 10.5px; padding: 2px 8px; border-radius: 4px; cursor: pointer; transition: all var(--transition-base); }
        .copy-btn:hover { border-color: #777; color: #ddd; }
        .copy-btn.copied { border-color: #4ade80; color: #4ade80; }
        .code-block pre { margin: 0 !important; padding: 13px 15px !important; background: #161820 !important; overflow-x: auto; font-family: var(--mono) !important; font-size: 13px !important; line-height: 1.65 !important; }
        .code-block pre code { font-size: inherit !important; background: none !important; border: none !important; padding: 0 !important; color: #e2e8f0 !important; }
        .apply-code-btn {
            display: none; margin-top: 4px; padding: 3px 8px; font-size: 10px;
            background: var(--blue); color: white; border: none; border-radius: 4px;
            cursor: pointer; transition: background var(--transition-base);
            align-items: center; gap: 3px;
        }
        .apply-code-btn.visible { display: inline-flex; }
        .apply-code-btn:hover { background: var(--blue-dim); }

        .cursor { display: inline-block; width: 2px; height: 1.05em; background: var(--blue); vertical-align: text-bottom; animation: blink .9s step-end infinite; border-radius: 1px; margin-left: 1px; transition: background var(--transition-base); }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
        .typing-dots span { width: 5px; height: 5px; background: var(--text-3); border-radius: 50%; animation: dotBounce 1.1s ease-in-out infinite; transition: background var(--transition-base); }
        .typing-dots span:nth-child(2) { animation-delay: .14s; }
        .typing-dots span:nth-child(3) { animation-delay: .28s; }
        @keyframes dotBounce { 0%,60%,100% { transform: translateY(0); opacity: .35; } 30% { transform: translateY(-5px); opacity: 1; } }

        /* ── Input area ── */
        .input-area {
            border-top: 1px solid var(--border); padding: 13px 22px;
            padding-bottom: max(13px,env(safe-area-inset-bottom));
            background: var(--surface); flex-shrink: 0; transition: background var(--transition-base),border-color var(--transition-base);
        }
        .input-inner { max-width: 760px; margin: 0 auto; }
        .file-indicator {
            display: none; align-items: center; gap: 6px; margin-bottom: 7px;
            padding: 5px 10px; background: var(--blue-tint);
            border: 1px solid color-mix(in srgb,var(--blue) 25%,transparent);
            border-radius: 8px; font-size: 10.5px; color: var(--blue);
            font-family: var(--mono);
        }
        .file-indicator.visible { display: flex; }
        .file-indicator-clear {
            margin-left: auto; background: transparent; border: none; cursor: pointer;
            color: var(--blue); padding: 0; display: flex; align-items: center;
            opacity: .7; transition: opacity var(--transition-base);
        }
        .file-indicator-clear:hover { opacity: 1; }
        .input-box {
            display: flex; align-items: flex-end; gap: 8px; background: var(--bg);
            border: 1.5px solid var(--border); border-radius: 13px; padding: 8px 8px 8px 14px;
            transition: border-color var(--transition-base),box-shadow var(--transition-base),background var(--transition-base);
        }
        .input-box:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,128,255,.1); background: var(--surface); }
        textarea#userInput {
            flex: 1; border: none; background: transparent; resize: none; outline: none;
            font-family: var(--sans); font-size: 14px; color: var(--text); line-height: 1.6;
            padding: 3px 0; max-height: 130px; min-height: 24px; transition: color var(--transition-base);
        }
        textarea#userInput::placeholder { color: var(--text-3); }
        .send-btn {
            width: 34px; height: 34px; border-radius: 8px; background: var(--blue); border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: #fff; flex-shrink: 0; transition: background 0.13s,transform 0.1s,opacity 0.13s;
        }
        .send-btn:hover { background: var(--blue-dim); }
        .send-btn:active { transform: scale(.9); }
        .send-btn:disabled { background: var(--border); cursor: not-allowed; opacity: .6; }
        .stop-btn {
            width: 34px; height: 34px; border-radius: 8px; background: var(--danger); border: none;
            cursor: pointer; display: none; align-items: center; justify-content: center;
            color: #fff; flex-shrink: 0; transition: background 0.13s,transform 0.1s;
        }
        .stop-btn:hover { background: #b91c1c; }
        .stop-btn:active { transform: scale(.9); }
        .stop-btn.visible { display: flex; }
        .input-hint { font-size: 10.5px; color: var(--text-3); text-align: center; margin-top: 7px; transition: color var(--transition-base); }
        .token-saver { margin-top: 8px; text-align: right; }
        .token-saver button {
            background: none; border: 1px solid var(--border); color: var(--text-2); padding: 4px 10px;
            border-radius: 5px; font-size: 10.5px; cursor: pointer; transition: all var(--transition-base);
            display: inline-flex; align-items: center; gap: 4px;
        }
        .token-saver button:hover { background: var(--blue-tint); color: var(--blue); border-color: var(--blue); }

        /* Mobile overlay */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.32); z-index: 15; backdrop-filter: blur(2px); }

        /* Toast */
        .toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1c1d21; color: #e8e9ed; padding: 9px 18px; border-radius: 20px;
            font-size: 12.5px; font-family: var(--sans); font-weight: 500; z-index: 99;
            opacity: 0; transition: opacity 0.25s,transform 0.25s; pointer-events: none;
            letter-spacing: .01em; box-shadow: 0 4px 16px rgba(0,0,0,.2);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Modal for preview */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 30;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: var(--surface); border-radius: 14px; box-shadow: 0 12px 36px rgba(0,0,0,0.2);
            width: 90vw; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column;
            transition: background var(--transition-base);
        }
        .modal-header {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { font-size: 14px; font-weight: 600; }
        .modal-close { background: none; border: none; color: var(--text-2); cursor: pointer; padding: 4px; border-radius: 6px; transition: background var(--transition-base); display: flex; }
        .modal-close:hover { background: var(--bg); }
        .modal-body { padding: 14px 18px; overflow-y: auto; font-family: var(--mono); font-size: 12px; line-height: 1.7; white-space: pre-wrap; flex: 1; color: var(--text); }

        /* Responsive */
        @media (max-width: 720px) {
            .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,.12); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .overlay { display: block; }
            .topbar { display: flex; }
            .messages { padding: 16px 0 6px; }
            .message-wrap { padding: 0 12px; }
            .input-area { padding: 10px 12px; padding-bottom: max(10px,env(safe-area-inset-bottom)); }
            .message { gap: 9px; margin-bottom: 18px; }
            .msg-content { font-size: 14px; }
            .msg-actions { opacity: 1; }
            .toast { bottom: 70px; }
            .file-del { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">文件预览</span>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <input type="file" id="fileInput" multiple hidden onchange="handleFileInput(this)">
    <input type="file" id="folderInput" webkitdirectory multiple hidden onchange="handleFileInput(this)">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 3L20 7.5V16.5L12 21L4 16.5V7.5L12 3Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M12 3V21M4 7.5L20 16.5M20 7.5L4 16.5" stroke="white" stroke-width="1.1" opacity=".4"/>
                </svg>
            </div>
            <span class="brand-name">DeepSeek</span>
        </div>

        <div class="sidebar-section">模型选择</div>
        <div class="model-list">
            <button class="model-item active" data-model="deepseek-chat" onclick="selectModel(this)">
                <span class="model-item-name">V4 Flash</span>
                <span class="model-item-desc">快速响应 · 高性价比</span>
            </button>
            <button class="model-item" data-model="deepseek-v4-pro" onclick="selectModel(this)">
                <span class="model-item-name">V4 Pro</span>
                <span class="model-item-desc">深度思考 · 复杂推理</span>
            </button>
        </div>

        <div class="divider"></div>
        <div class="sidebar-section">界面主题</div>
        <div class="theme-list">
            <button class="theme-item active" data-theme="light" onclick="setTheme('light',this)"><span class="theme-dot" style="background:#f5f6f8;border-color:#d1d5db;"></span>浅色</button>
            <button class="theme-item" data-theme="dark" onclick="setTheme('dark',this)"><span class="theme-dot" style="background:#1c1d21;border-color:#3a3b42;"></span>暗黑</button>
            <button class="theme-item" data-theme="navy" onclick="setTheme('navy',this)"><span class="theme-dot" style="background:#0a1020;border-color:#1e2d4a;"></span>夜蓝</button>
            <button class="theme-item" data-theme="warm" onclick="setTheme('warm',this)"><span class="theme-dot" style="background:#fdf6ec;border-color:#e8d5b0;"></span>暖米</button>
            <button class="theme-item" data-theme="forest" onclick="setTheme('forest',this)"><span class="theme-dot" style="background:#f0fdf4;border-color:#bbf7d0;"></span>绿野</button>
            <button class="theme-item" data-theme="rose" onclick="setTheme('rose',this)"><span class="theme-dot" style="background:#fff5f6;border-color:#fecdd3;"></span>玫瑰</button>
        </div>

        <div class="divider"></div>
        <button class="collapse-toggle open" id="advToggle" onclick="togglePanel('adv')">
            高级参数设置
            <svg class="collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="collapse-content open" id="advContent">
            <div class="collapse-inner">
                <label class="field-label" style="margin-top:2px;">系统提示词</label>
                <textarea class="sys-prompt-area" id="systemPrompt" placeholder="设定AI的角色或行为规则..." oninput="saveSettings()"></textarea>
                <div style="margin-top:10px;">
                    <div class="setting-row"><span class="setting-label">Temperature</span><input type="range" class="setting-slider" id="temperature" min="0" max="200" value="100" oninput="updateSlider('temperature')"><span class="setting-value" id="temperatureVal">1.00</span></div>
                    <div class="setting-row"><span class="setting-label">Top-P</span><input type="range" class="setting-slider" id="topP" min="0" max="100" value="100" oninput="updateSlider('topP')"><span class="setting-value" id="topPVal">1.00</span></div>
                    <div class="setting-row"><span class="setting-label">Max Tokens</span><input type="number" class="setting-input-sm" id="maxTokens" value="4096" min="1" max="65536" onchange="saveSettings()"></div>
                    <div class="setting-row"><span class="setting-label">频率惩罚</span><input type="range" class="setting-slider" id="freqPenalty" min="0" max="200" value="0" oninput="updateSlider('freqPenalty')"><span class="setting-value" id="freqPenaltyVal">0.00</span></div>
                    <div class="setting-row"><span class="setting-label">存在惩罚</span><input type="range" class="setting-slider" id="presPenalty" min="0" max="200" value="0" oninput="updateSlider('presPenalty')"><span class="setting-value" id="presPenaltyVal">0.00</span></div>
                </div>
            </div>
        </div>

        <div class="divider"></div>
        <button class="collapse-toggle open" id="fileToggle" onclick="togglePanel('file')">
            项目文件
            <svg class="collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="collapse-content open" id="fileContent">
            <div class="collapse-inner">
                <div class="file-upload-btns">
                    <button class="small-btn" onclick="document.getElementById('fileInput').click()">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                        上传文件
                    </button>
                    <button class="small-btn" onclick="document.getElementById('folderInput').click()">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                        上传目录
                    </button>
                </div>
                <div class="file-search">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" placeholder="搜索文件..." id="fileSearchInput" oninput="renderFileTree()">
                </div>
                <div class="file-tree" id="fileTree">
                    <div class="file-empty">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 6px;display:block;opacity:.4"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        暂无文件<br>点击上方按钮上传
                    </div>
                </div>
                <div class="file-stats" id="fileStats"></div>
                <button class="small-btn danger" onclick="clearAllFiles()" style="width:100%;margin-top:2px;">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    清除全部文件
                </button>
                <div class="token-saver">
                    <button onclick="compressContext()" title="自动总结长对话以节省token">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                        压缩上下文
                    </button>
                </div>
            </div>
        </div>

        <div class="divider"></div>
        <div class="sidebar-footer">
            <label class="field-label">API 密钥</label>
            <input type="password" class="field-input" id="apiKey" placeholder="sk-..." oninput="saveKey()" autocomplete="off">
            <div class="divider" style="margin:10px 0;"></div>
            <label class="field-label">对话记忆</label>
            <div class="mem-count" id="memCount">暂无记忆</div>
            <div class="mem-actions">
                <button class="small-btn primary" onclick="newConversation()">新对话</button>
                <button class="small-btn" onclick="exportMemory()">导出</button>
            </div>
        </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">
        <div class="topbar">
            <button class="icon-btn" onclick="openSidebar()" aria-label="打开菜单">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="topbar-title" id="topbarTitle">V4 Flash</span>
            <button class="icon-btn danger" id="mobileStopBtn" style="display:none;" onclick="stopGeneration()" aria-label="停止生成">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
        </div>

        <div class="messages" id="messages">
            <div class="message-wrap" id="welcomeWrap">
                <div class="message ai">
                    <div class="msg-avatar ai-avatar">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3L20 7.5V16.5L12 21L4 16.5V7.5L12 3Z" stroke="white" stroke-width="2" stroke-linejoin="round"/></svg>
                    </div>
                    <div class="msg-body">
                        <div class="msg-meta"><div class="msg-role">DeepSeek</div></div>
                        <div class="msg-content">你好，请填写 API 密钥后开始对话。支持流式输出、代码高亮、Markdown 渲染，以及文件上传（包含目录结构）。AI 可以直接修改你的项目文件（使用 <code>[[file:路径]]</code> 标记）。点击左侧可切换模型和主题。</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-inner">
                <div class="file-indicator" id="fileIndicator">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span id="fileIndicatorText"></span>
                    <button class="file-indicator-clear" onclick="goToFilePanel()" title="管理文件">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    </button>
                </div>
                <div class="input-box">
                    <textarea id="userInput" rows="1" placeholder="发送消息..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
                    <button class="stop-btn" id="stopBtn" onclick="stopGeneration()" aria-label="停止生成">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                    </button>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="发送">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <div class="input-hint" id="inputHint">Enter 发送 · Shift+Enter 换行</div>
            </div>
        </div>
    </main>
</div>

<script>
/* ================================================================
   核心状态与常量 (部分)
   ================================================================ */
const API_URL = 'https://api.deepseek.com/chat/completions';
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

let chatHistory = [];
let currentModel = 'deepseek-chat';
let streaming = false;
let abortController = null;
let currentAiShellId = null;
let currentFullText = '';
let lastUserMessage = '';

/* 文件存储 Map<path, {name,path,content,size,active}> */
let fileStore = new Map();

const TEXT_EXTENSIONS = new Set([
    'txt','md','markdown','js','mjs','cjs','ts','tsx','jsx',
    'css','scss','sass','less','styl',
    'html','htm','xml','svg','xhtml',
    'json','json5','jsonc','yaml','yml','toml','ini','cfg','conf','env',
    'py','rb','go','rs','java','c','cpp','cc','cxx','h','hpp','cs','php',
    'swift','kt','kts','scala','r','m','sh','bash','zsh','fish','bat','cmd','ps1',
    'sql','graphql','gql','proto','vue','svelte','astro','ejs','pug','jinja',
    'gitignore','gitattributes','prettierrc','eslintrc','babelrc','editorconfig',
    'dockerfile','makefile','rakefile','gemfile','procfile',
    'lock','map','log','patch','diff','mod','sum',
    'gradle','cmake','mk',
]);

/* ================================================================
   工具函数
   ================================================================ */
function escHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(t) {
    return escHtml(t).replace(/'/g,'&#39;');
}
function safeParse(text) {
    if (typeof text !== 'string') text = String(text || '');
    return marked.parse(text);
}
function formatTime() {
    return new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}
function showToast(msg, duration = 2000) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
}

/* ================================================================
   文件管理辅助
   ================================================================ */
function isTextFile(name) {
    const parts = name.split('.');
    if (parts.length === 1) {
        const bare = name.toLowerCase();
        return ['dockerfile','makefile','rakefile','gemfile','procfile','readme','license','changelog','authors','contributing','vagrantfile','brewfile'].includes(bare);
    }
    const ext = parts.pop().toLowerCase();
    return TEXT_EXTENSIONS.has(ext);
}

async function readAsText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = () => reject(new Error('读取失败'));
        reader.readAsText(file, 'UTF-8');
    });
}

async function handleFileInput(input) {
    const files = Array.from(input.files);
    input.value = '';
    if (!files.length) return;
    document.getElementById('fileStats').textContent = '读取中...';
    let added = 0, replaced = 0, skipped = 0;
    const MAX_SIZE = 512 * 1024;
    for (const file of files) {
        const path = (file.webkitRelativePath || file.name).replace(/\\/g, '/');
        const name = path.split('/').pop();
        if (name.startsWith('.DS_Store') || name === 'Thumbs.db') { skipped++; continue; }
        if (!isTextFile(name)) { skipped++; continue; }
        if (file.size > MAX_SIZE) { skipped++; continue; }
        try {
            const content = await readAsText(file);
            const existed = fileStore.has(path);
            fileStore.set(path, { name, path, content, size: file.size, active: true });
            if (existed) replaced++; else added++;
        } catch(e) { skipped++; }
    }
    renderFileTree();
    updateFileStats();
    saveFilesToStorage();
    const parts = [];
    if (added > 0) parts.push(`新增 ${added} 个文件`);
    if (replaced > 0) parts.push(`更新 ${replaced} 个文件`);
    if (skipped > 0) parts.push(`跳过 ${skipped} 个`);
    showToast(parts.join(' · ') || '无变化');
}

function buildTree(paths) {
    const root = {};
    for (const path of paths) {
        const parts = path.split('/');
        let node = root;
        for (let i = 0; i < parts.length - 1; i++) {
            if (!node[parts[i]]) node[parts[i]] = { __dir: true, __children: {} };
            node = node[parts[i]].__children;
        }
        node[parts[parts.length - 1]] = { __file: true, __path: path };
    }
    return root;
}

function renderTreeNode(node, depth, filter = '') {
    let html = '';
    const indent = depth * 14;
    const entries = Object.entries(node).sort(([ak, av], [bk, bv]) => {
        if (av.__dir && !bv.__dir) return -1;
        if (!av.__dir && bv.__dir) return 1;
        return ak.localeCompare(bk);
    });
    for (const [name, val] of entries) {
        if (val.__file) {
            const f = fileStore.get(val.__path);
            if (!f || (filter && !val.__path.toLowerCase().includes(filter.toLowerCase()) && !name.toLowerCase().includes(filter.toLowerCase()))) continue;
            const active = f.active;
            html += `<div class="file-item ${active ? 'active' : ''}" data-path="${escAttr(val.__path)}" onclick="openFilePreview('${escAttr(val.__path)}')" title="${escAttr(val.__path)}" style="padding-left:${indent + 10}px">
                <svg class="file-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span class="file-name">${escHtml(name)}</span>
                <span class="file-size">${formatSize(f.size)}</span>
                <button class="file-del" onclick="event.stopPropagation();toggleFileActive('${escAttr(val.__path)}')" title="切换启用状态">
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
                </button>
            </div>`;
        } else if (val.__dir) {
            const childrenHtml = renderTreeNode(val.__children, depth + 1, filter);
            if (!filter || childrenHtml) {
                html += `<div class="file-dir" style="padding-left:${indent + 10}px">
                    <svg class="file-dir-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <span>${escHtml(name)}</span>
                </div>`;
                html += childrenHtml;
            }
        }
    }
    return html;
}

function renderFileTree() {
    const treeEl = document.getElementById('fileTree');
    const filter = document.getElementById('fileSearchInput')?.value || '';
    if (fileStore.size === 0) {
        treeEl.innerHTML = `<div class="file-empty">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 6px;display:block;opacity:.4"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            暂无文件<br>点击上方按钮上传
        </div>`;
        return;
    }
    const sortedPaths = Array.from(fileStore.keys()).sort();
    const tree = buildTree(sortedPaths);
    treeEl.innerHTML = renderTreeNode(tree, 0, filter) || `<div class="file-empty">没有匹配的文件</div>`;
}

function updateFileStats() {
    const allFiles = Array.from(fileStore.values());
    const activeFiles = allFiles.filter(f => f.active);
    const totalChars = activeFiles.reduce((s, f) => s + f.content.length, 0);
    const statsEl = document.getElementById('fileStats');
    if (allFiles.length === 0) {
        statsEl.textContent = '';
        statsEl.className = 'file-stats';
    } else {
        const warn = totalChars > 80000;
        statsEl.textContent = `${activeFiles.length}/${allFiles.length} 个文件已启用 · ${formatSize(totalChars)}`;
        statsEl.className = 'file-stats' + (warn ? ' warn' : '');
    }
    const indicator = document.getElementById('fileIndicator');
    const indicatorText = document.getElementById('fileIndicatorText');
    if (activeFiles.length > 0) {
        indicator.classList.add('visible');
        indicatorText.textContent = `已附加 ${activeFiles.length} 个文件 (${formatSize(totalChars)})`;
    } else {
        indicator.classList.remove('visible');
    }
    if (!isMobile) {
        document.getElementById('inputHint').textContent = activeFiles.length > 0
            ? `Enter 发送 · Shift+Enter 换行 · 已附加 ${activeFiles.length} 个文件`
            : 'Enter 发送 · Shift+Enter 换行';
    }
}

function saveFilesToStorage() {

/* ================================================================
   AI 修改应用处理
   ================================================================ */
function scanForApplyBlocks(msgContentEl) {
    if (!msgContentEl) return;
    const elements = msgContentEl.children;
    for (let i = 0; i < elements.length; i++) {
        const el = elements[i];
        if (el.tagName === 'P' && el.innerText.trim().match(/^\[\[file:(.+)\]\]$/)) {
            const path = el.innerText.trim().match(/^\[\[file:(.+)\]\]$/)[1];
            const next = elements[i + 1];
            if (next && next.classList.contains('code-block')) {
                if (!next.querySelector('.apply-code-btn')) {
                    const btn = document.createElement('button');
                    btn.className = 'apply-code-btn visible';
                    btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> 应用到文件';
                    btn.onclick = (function(filePath, codeBlock) {
                        return function() { applyFileChange(filePath, codeBlock); };
                    })(path, next);
                    next.appendChild(btn);
                }
            }
        }
    }
}

function applyFileChange(path, codeBlock) {
    const codeEl = codeBlock.querySelector('pre code');
    if (!codeEl) return;
    const newContent = codeEl.innerText || codeEl.textContent || '';
    if (!newContent.trim()) { showToast('代码块内容为空'); return; }
    if (!fileStore.has(path)) {
        if (!confirm(`文件 ${path} 不存在，确定创建该文件并写入内容？`)) return;
        fileStore.set(path, { name: path.split('/').pop(), path, content: newContent, size: new Blob([newContent]).size, active: true });
    } else {
        const f = fileStore.get(path);
        f.content = newContent;
        f.size = new Blob([newContent]).size;
        fileStore.set(path, f);
    }
    renderFileTree();
    updateFileStats();
    saveFilesToStorage();
    showToast(`已更新文件 ${path}`);
}

/* ================================================================
   压缩上下文 (智能总结)
   ================================================================ */
async function compressContext() {
    if (streaming) { showToast('请等待当前生成结束'); return; }
    const key = document.getElementById('apiKey').value.trim();
    if (!key) { openSidebar(); document.getElementById('apiKey').focus(); showToast('请先填写 API 密钥'); return; }
    if (chatHistory.length < 3) { showToast('对话轮数不足，无需压缩'); return; }

    const lastUser = chatHistory.filter(m => m.role === 'user').pop();
    const recentMsgs = [lastUser].filter(Boolean);
    const oldMsgs = chatHistory.filter(m => m !== lastUser);

    const summaryPrompt = `请用简短中文总结以下对话历史的关键要点，只保留技术细节、决策和重要信息，删除寒暄和重复内容。直接返回总结，不要解释。`;
    const summaryMessages = [
        { role: 'system', content: summaryPrompt },
        ...oldMsgs,
        { role: 'user', content: '请总结以上对话历史。' }
    ];

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
            body: JSON.stringify({
                model: currentModel,
                messages: summaryMessages,
                stream: false,
                max_tokens: 600,
                temperature: 0.2
            })
        });
        if (!res.ok) throw new Error('API请求失败');
        const data = await res.json();
        const summary = data.choices?.[0]?.message?.content || '历史对话已总结。';
        chatHistory = [
            { role: 'system', content: `[对话历史总结] ${summary}` },
            ...recentMsgs
        ];
        saveHistory();
        showToast('上下文已压缩');
    } catch(e) {
        // 回退简单截断
        const recentSystem = chatHistory.filter(m => m.role === 'system');
        const keep = recentSystem.slice(-1).concat(chatHistory.slice(-6));
        chatHistory = keep;
        saveHistory();
        showToast('压缩失败，已保留最近对话');
    }
    // 重新渲染历史
    const msgsEl = document.getElementById('messages');
    msgsEl.innerHTML = '';
    chatHistory.forEach(m => {
        if (m.role === 'user') renderUserMsg(m.content, false, null);
        else if (m.role === 'assistant') renderAiMsgStatic(m.content, false, null, null);
        else if (m.role === 'system') {
            // 显示系统提示但不替代渲染
            const wrap = document.createElement('div'); wrap.className = 'message-wrap'; wrap.setAttribute('data-role', 'system');
            wrap.innerHTML = `<div class="message ai"><div class="msg-avatar ai-avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3L20 7.5V16.5L12 21L4 16.5V7.5L12 3Z" stroke="white" stroke-width="2" stroke-linejoin="round"/></svg></div>
            <div class="msg-body"><div class="msg-meta"><div class="msg-role">系统</div></div><div class="msg-content">${escHtml(m.content)}</div></div></div>`;
            msgsEl.appendChild(wrap);
        }
    });
    updateMemCount();
}

function buildMessages(settings) {
    const fileCtx = buildFileContext();
    const sysParts = [settings.systemPrompt?.trim(), fileCtx].filter(Boolean);
    const messages = [];
    if (sysParts.length > 0) messages.push({ role: 'system', content: sysParts.join('\n\n') });
    messages.push(...chatHistory);

}

/* ================================================================

async function sendMessage() {
    if (streaming) return;

    const text = input.value.trim();
    const key = document.getElementById('apiKey').value.trim();
    if (!text) return;

    const btn = document.getElementById('sendBtn');

    const mobileStopBtn = document.getElementById('mobileStopBtn');
    streaming = true;
    lastUserMessage = text;
    input.value = ''; input.style.height = 'auto';
    btn.disabled = true;
    stopBtn.classList.add('visible');
    if (isMobile) mobileStopBtn.style.display = 'flex';
    const welcomeWrap = document.getElementById('welcomeWrap');
    if (welcomeWrap) welcomeWrap.remove();
    const userTime = formatTime();
    renderUserMsg(text, true, userTime);
    chatHistory.push({ role: 'user', content: text });
    if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
    const aiTime = formatTime();
    currentAiShellId = appendAiShell(aiTime);
    const contentEl = document.getElementById(currentAiShellId);
    currentFullText = '';
    let capturedUsage = null;
    const settings = getSettings();
    abortController = new AbortController();
    try {
        const body = {
            model: currentModel,
            messages: buildMessages(settings),
            stream: true,
            stream_options: { include_usage: true },
            temperature: settings.temperature,
            top_p: settings.topP,
            max_tokens: settings.maxTokens,
            frequency_penalty: settings.freqPenalty,
            presence_penalty: settings.presPenalty,
        };
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${key}` },
            body: JSON.stringify(body),
            signal: abortController.signal,
        });
        if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.error?.message || `HTTP ${res.status}`); }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        contentEl.innerHTML = '<span class="cursor"></span>';
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const raw = decoder.decode(value, { stream: true });
            for (const line of raw.split('\n')) {
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6).trim();
                if (data === '[DONE]') continue;
                try {
                    const json = JSON.parse(data);
                    if (json.usage) capturedUsage = json.usage;
                    const delta = json.choices?.[0]?.delta?.content || '';
                    if (delta) {
                        currentFullText += delta;
                        contentEl.innerHTML = safeParse(currentFullText) + '<span class="cursor"></span>';
                        scrollBottom();
                    }
                } catch(e) {}
            }
        }
        contentEl.innerHTML = safeParse(currentFullText);
        chatHistory.push({ role: 'assistant', content: currentFullText });
        saveHistory();
        finalizeStreamingMessage(capturedUsage);
    } catch(err) {
        if (err.name === 'AbortError') {
            if (currentFullText) {
                contentEl.innerHTML = safeParse(currentFullText);
                chatHistory.push({ role: 'assistant', content: currentFullText });
                saveHistory();
                finalizeStreamingMessage(capturedUsage);
            } else {
                const shell = document.querySelector('[data-role="assistant-streaming"]');
                if (shell) shell.remove();
            }
        } else {
            contentEl.innerHTML = safeParse(`**请求失败：** ${escHtml(err.message || '未知错误')}`);
            chatHistory.pop();
        }
    } finally {
        streaming = false; abortController = null; currentAiShellId = null; currentFullText = '';
        btn.disabled = false; stopBtn.classList.remove('visible');
        if (isMobile) mobileStopBtn.style.display = 'none';
        if (!isMobile) input.focus();
        scrollBottom();
    }
}

function finalizeStreamingMessage(usage) {
    const wrap = document.querySelector('[data-role="assistant-streaming"]');
    if (!wrap) return;
    wrap.setAttribute('data-role', 'assistant');
    const msgBody = wrap.querySelector('.msg-body');
    if (!msgBody) return;
    if (usage) {
        const tokenDiv = document.createElement('div');
        tokenDiv.innerHTML = buildTokenHtml(usage);
        if (tokenDiv.firstChild) msgBody.appendChild(tokenDiv.firstChild);
    }
    if (!msgBody.querySelector('.msg-actions')) {
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        actions.innerHTML = '<button class="msg-action-btn retry-btn" onclick="retryFromHere(this)">重新生成</button><button class="msg-action-btn" onclick="copyMessage(this)">复制回复</button>';
        msgBody.appendChild(actions);
    }
    const contentEl = msgBody.querySelector('.msg-content');
    if (contentEl) scanForApplyBlocks(contentEl);
}

/* ================================================================
   重新生成与复制
   ================================================================ */
async function retryFromHere(btn) {
    if (streaming) return;
    const wrap = btn.closest('.message-wrap');
    if (!wrap) return;
    const allWraps = Array.from(document.getElementById('messages').querySelectorAll('.message-wrap'));
    const idx = allWraps.indexOf(wrap);
    if (idx < 0) return;
    const toRemove = allWraps.slice(idx);
    let removedCount = 0;
    toRemove.forEach(w => {
        const role = w.getAttribute('data-role');
        if (role === 'user' || role === 'assistant' || role === 'assistant-streaming') removedCount++;
        w.remove();
    });
    chatHistory = chatHistory.slice(0, Math.max(0, chatHistory.length - removedCount));
    if (lastUserMessage) {
        chatHistory.push({ role: 'user', content: lastUserMessage });
        renderUserMsg(lastUserMessage, false, null);
        saveHistory();
        await triggerRegenerate();
    }
}

function copyMessage(btn) {
    const msgContent = btn.closest('.msg-body')?.querySelector('.msg-content');
    if (!msgContent) return;
    const text = msgContent.innerText || msgContent.textContent || '';
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已复制';
        setTimeout(() => { btn.textContent = '复制回复'; }, 1500);
    }).catch(() => {
        const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        btn.textContent = '已复制';
        setTimeout(() => { btn.textContent = '复制回复'; }, 1500);
    });
}
