        /* ================================================================
           文件管理
           ================================================================ */
        function setupFileDropZone() {
            const dropZone = document.getElementById('fileDropZone');
            if (!dropZone) return;
            ['dragenter', 'dragover'].forEach(evt => {
                dropZone.addEventListener(evt, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.add('drag-over');
                });
            });
            ['dragleave', 'drop'].forEach(evt => {
                dropZone.addEventListener(evt, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.remove('drag-over');
                });
            });
            dropZone.addEventListener('drop', (e) => {
                const items = e.dataTransfer.items;
                if (items && items.length > 0) {
                    processDroppedItems(items);
                }
            });
               function setupGlobalDragDrop() {
            const overlay = document.getElementById('globalDropOverlay');
            const mainArea = document.getElementById('mainArea');
            let dragCounter = 0;
            ['dragenter', 'dragover'].forEach(evt => {
                document.body.addEventListener(evt, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dragCounter++;
                    if (dragCounter === 1) overlay.classList.add('active');
                });
            });
            ['dragleave', 'drop'].forEach(evt => {
                document.body.addEventListener(evt, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dragCounter = Math.max(0, dragCounter - 1);
                    if (dragCounter === 0) overlay.classList.remove('active');
                });
            });
            document.body.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounter = 0;
                overlay.classList.remove('active');
                const items = e.dataTransfer.items;
                if (items && items.length > 0) {
                    processDroppedItems(items);
                }
            });
            // 也处理主区域的拖拽
            if (mainArea) {
                mainArea.addEventListener('drop', (e) => {
                    // body已经处理了
                });
            }
        }

        async function processDroppedItems(items) {
            const entries = [];
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.kind === 'file') {
                    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
                    if (entry) {
                        entries.push(entry);
                    } else {
                        const file = item.getAsFile();
                        if (file) entries.push(file);
                    }
                }
            }
            if (entries.length === 0) return;
            await processEntries(entries, '');
            updateFileUI();
            saveFileStore();
            showToast(`已上传 ${fileStore.size} 个文件`);
        }

        async function processEntries(entries, basePath) {
            for (const entry of entries) {
                if (entry instanceof File) {
                    // 直接是文件
                    const path = basePath ? basePath + '/' + entry.name : entry.name;
                    await readAndStoreFile(entry, path);
                } else if (entry.isFile) {
                    const file = await getFileFromEntry(entry);
                    const path = basePath ? basePath + '/' + entry.name : entry.name;
                    await readAndStoreFile(file, path);
                } else if (entry.isDirectory) {
                    const dirPath = basePath ? basePath + '/' + entry.name : entry.name;
                    const dirReader = entry.createReader();
                    const subEntries = await readAllDirectoryEntries(dirReader);
                    await processEntries(subEntries, dirPath);
                }
            }
        }

        function getFileFromEntry(entry) {
            return new Promise((resolve, reject) => {
                entry.file(resolve, reject);
            });
        }

        function readAllDirectoryEntries(dirReader) {
            return new Promise((resolve) => {
                const allEntries = [];
                function readBatch() {
                    dirReader.readEntries((entries) => {
                        if (entries.length === 0) {
                            resolve(allEntries);
                        } else {
                            allEntries.push(...entries);
                            readBatch();
                        }
                    }, () => resolve(allEntries));
                }
                readBatch();
            });
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            const fileList = Array.from(files);
            // 处理文件，保留相对路径
            fileList.forEach(file => {
                const path = file.webkitRelativePath || file.name;
                readAndStoreFile(file, path);
            });
            updateFileUI();
            saveFileStore();
            showToast(`已上传 ${fileStore.size} 个文件`);
            // 重置input以便重新选择相同文件
            event.target.value = '';
        }

        function isTextFile(file) {
            const textExtensions = ['.txt', '.js', '.ts', '.jsx', '.tsx', '.html', '.htm', '.css', '.scss', '.less',
                '.sass', '.json', '.xml', '.md', '.markdown', '.py', '.java', '.c', '.cpp', '.h', '.hpp', '.rs',
                '.go', '.rb', '.php', '.sql', '.yaml', '.yml', '.toml', '.ini', '.cfg', '.sh', '.bash', '.zsh',
                '.env', '.gitignore', '.dockerignore', '.editorconfig', '.eslintrc', '.prettierrc', '.babelrc',
                '.svg', '.csv', '.log', '.vue', '.svelte', '.astro', '.mjs', '.cjs', '.prisma', '.graphql',
                '.gql', '.tf', '.proto', '.lua', '.r', '.swift', '.kt', '.scala', '.clj', '.elm', '.ex', '.exs',
                '.dart', '.pl', '.pm', '.tcl', '.bat', '.ps1', '.cmake', '.makefile', 'makefile', 'dockerfile',
                '.conf', '.config', '.lock', '.component.ts', '.module.ts', '.service.ts', '.directive.ts',
                '.pipe.ts', '.guard.ts', '.spec.ts', '.test.ts', '.stories.ts', '.map'
            ];
            const name = file.name.toLowerCase();
            if (textExtensions.some(ext => name.endsWith(ext))) return true;
            if (name === 'makefile' || name === 'dockerfile' || name === '.gitignore' || name === '.env') return true;
            const mimeType = file.type || '';
            if (mimeType.startsWith('text/') || mimeType === 'application/json' || mimeType ===
                'application/javascript' || mimeType === 'application/xml' || mimeType === 'application/x-sh') return true;
            if (mimeType === '' && file.size < 512 * 1024) return true; // 无类型且小于512KB尝试读取
            return false;
        }

        async function readAndStoreFile(file, path) {
            // 规范化路径
            const normalizedPath = path.replace(/\\/g, '/').replace(/\/+/g, '/').replace(/^\.?\//, '');
            if (isTextFile(file)) {
                try {
                    const content = await readFileAsText(file);
                    fileStore.set(normalizedPath, {
                        content: content,
                        size: file.size,
                        type: file.type || 'text/plain',
                        lastModified: file.lastModified,
                        isText: true
                    });
                } catch (e) {
                    fileStore.set(normalizedPath, {
                        content: '[无法读取文件内容: ' + e.message + ']',
                        size: file.size,
                        type: file.type || 'text/plain',
                        lastModified: file.lastModified,
                        isText: false
                    });
                }
            } else {
                fileStore.set(normalizedPath, {
                    content: '[二进制文件，无法显示内容]',
                    size: file.size,
                    type: file.type || 'application/octet-stream',
                    lastModified: file.lastModified,
                    isText: false
                });
            }
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('读取失败'));
                if (file.size > 5 * 1024 * 1024) {
                    // 大于5MB警告但仍尝试读取
                    console.warn('文件较大: ' + file.name + ' (' + formatBytes(file.size) + ')');
                }
                reader.readAsText(file, 'UTF-8');
            });
        }

        function clearAllFiles() {
            if (fileStore.size === 0) return;
            if (!confirm(`确定清空全部 ${fileStore.size} 个文件？`)) return;
            fileStore.clear();
            updateFileUI();
            saveFileStore();
            showToast('已清空所有文件');
        }

        function deleteFile(path) {
            fileStore.delete(path);
            updateFileUI();
            saveFileStore();
            showToast('已删除: ' + path);
        }

        function updateFileUI() {
            // 更新文件树
            const fileTree = document.getElementById('fileTree');
            const fileCountBadgeSidebar = document.getElementById('fileCountBadgeSidebar');
            const fileCountBadgeInput = document.getElementById('fileCountBadgeInput');

            if (fileStore.size === 0) {
                fileTree.innerHTML =
                    '<span style="color:var(--text-3);font-style:italic;">暂无文件，上传后文件将以文本格式发送给AI</span>';
                fileCountBadgeSidebar.textContent = '0 个文件';
                fileCountBadgeSidebar.style.display = 'inline-flex';
                fileCountBadgeInput.classList.add('empty');
            } else {
                fileTree.innerHTML = buildFileTreeHTML();
                fileCountBadgeSidebar.textContent = fileStore.size + ' 个文件';
                fileCountBadgeSidebar.style.display = 'inline-flex';
                fileCountBadgeInput.classList.remove('empty');
                fileCountBadgeInput.textContent = '文件夹 ' + fileStore.size + ' 个文件';
                fileCountBadgeInput.style.display = 'inline-flex';
            }
        }

        function buildFileTreeHTML() {
            // 构建目录树结构
            const tree = {};
            fileStore.forEach((info, path) => {
                const parts = path.split('/');
                let current = tree;
                for (let i = 0; i < parts.length - 1; i++) {
                    if (!current[parts[i]]) current[parts[i]] = { _children: {} };
                    if (!current[parts[i]]._children) current[parts[i]]._children = {};
                    current = current[parts[i]]._children;
                }
                const fileName = parts[parts.length - 1];
                current[fileName] = { _file: true, _info: info, _path: path };
            });

            function renderTree(node, level = 0) {
                let html = '';
                const keys = Object.keys(node).sort((a, b) => {
                    const aIsDir = node[a]._children !== undefined;
                    const bIsDir = node[b]._children !== undefined;
                    if (aIsDir && !bIsDir) return -1;
                    if (!aIsDir && bIsDir) return 1;
                    return a.localeCompare(b);
                });
                for (const key of keys) {
                    const val = node[key];
                    if (val._file) {
                        const info = val._info;
                        const path = val._path;
                        const icon = info.isText ? '文档' : '链接';
                        html +=
                            `<div class="file-tree-item" style="padding-left:${level*14+6}px;" title="${escHtml(path)}&#10;大小: ${formatBytes(info.size)}&#10;修改: ${new Date(info.lastModified).toLocaleString('zh-CN')}"><span class="ft-icon">${icon}</span><span class="ft-name">${escHtml(key)}</span><span class="ft-size">${formatBytes(info.size)}</span><button class="ft-delete" title="删除" onclick="event.stopPropagation();deleteFile('${escHtml(path).replace(/'/g,"&#39;")}')">×</button></div>`;
                    } else if (val._children) {
                        const dirId = 'dir-' + Math.random().toString(36).slice(2, 8);
                        html +=
                            `<div class="file-tree-item file-tree-dir" style="padding-left:${level*14+6}px;" onclick="toggleDir('${dirId}')" title="展开/折叠目录"><span class="ft-icon" id="${dirId}-arrow">▼</span><span>文件夹</span><span class="ft-name">${escHtml(key)}/</span></div>`;
                        html +=
                            `<div class="file-tree-children" id="${dirId}">${renderTree(val._children, level+1)}</div>`;
                    }
                }
                return html;
            }
            return renderTree(tree);
        }

        function toggleDir(dirId) {
            const children = document.getElementById(dirId);
            const arrow = document.getElementById(dirId + '-arrow');
            if (!children || !arrow) return;
            children.classList.toggle('collapsed');
            const parentDir = arrow.closest('.file-tree-dir');
            if (parentDir) parentDir.classList.toggle('collapsed');
        }

        function toggleFileManager() {
            const toggle = document.getElementById('fileToggle');
            const content = document.getElementById('fileContent');
            toggle.classList.toggle('open');
            content.classList.toggle('open');
        }

        function saveFileStore() {
            const serializable = [];
            fileStore.forEach((info, path) => {
                serializable.push({ path, ...info });
            });
            try {
                localStorage.setItem('ds_files', JSON.stringify(serializable));
            } catch (e) {
                // 存储空间不足，提示用户
                console.warn('文件存储空间不足，部分文件可能无法保存');
                showToast('文件过多，本地存储空间不足');
            }
        }

        function restoreFileStore() {
            const saved = localStorage.getItem('ds_files');
            if (!saved) return;
            try {
                const arr = JSON.parse(saved);
                fileStore.clear();
                arr.forEach(item => {
                    const { path, ...info } = item;
                    fileStore.set(path, info);
                });
                updateFileUI();
            } catch (e) {
                console.warn('恢复文件存储失败');
            }
        }

        /* ================================================================
           构建带文件内容的用户消息
           ================================================================ */
        function buildUserMessageWithFiles(userText) {
            if (fileStore.size === 0) return userText;

            // 构建文件结构树
            const tree = {};
            fileStore.forEach((info, path) => {
                const parts = path.split('/');
                let current = tree;
                for (let i = 0; i < parts.length - 1; i++) {
                    if (!current[parts[i]]) current[parts[i]] = { _children: {} };
                    current = current[parts[i]]._children;
                }
                current[parts[parts.length - 1]] = { _file: true, _info: info, _path: path };
            });

            function renderFileTree(node, indent = '') {
                let result = '';
                const keys = Object.keys(node).sort((a, b) => {
                    const aIsDir = node[a]._children !== undefined;
                    const bIsDir = node[b]._children !== undefined;
                    if (aIsDir && !bIsDir) return -1;
                    if (!aIsDir && bIsDir) return 1;
                    return a.localeCompare(b);
                });
                for (const key of keys) {
                    const val = node[key];
                    if (val._file) {
                        result += `${indent}文档 ${key} (${formatBytes(val._info.size)})\n`;
                    } else if (val._children) {
                        result += `${indent}文件夹 ${key}/\n`;
                        result += renderFileTree(val._children, indent + '  ');
                    }
                }
                return result;
            }

            let fileContext = '[系统说明：以下是用户上传的文件，请根据这些文件的内容来回答用户的问题。]\n\n';
            fileContext += '[文件结构]\n';
            fileContext += renderFileTree(tree);
            fileContext += '\n[文件内容]\n';

            // 按路径排序输出文件内容
            const sortedPaths = Array.from(fileStore.keys()).sort();
            for (const path of sortedPaths) {
                const info = fileStore.get(path);
                fileContext += `\n--- ${path} ---\n`;
                if (info.isText && info.content.length < 100000) {
                    fileContext += info.content + '\n';
                } else if (info.isText && info.content.length >= 100000) {
                    fileContext += info.content.substring(0, 100000) +
                        '\n... [文件过长，已截断，完整文件大小: ' + formatBytes(info.size) + ']\n';
                } else {
                    fileContext += '[非文本文件，大小: ' + formatBytes(info.size) + ']\n';
                }
            }

            fileContext += '\n--- 用户消息 ---\n';
            fileContext += userText;
            return fileContext;
        }

        /* ================================================================
           发送消息
           ================================================================ */
        async function sendMessage() {
            if (streaming) return;
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            const key = document.getElementById('apiKey').value.trim();
            const btn = document.getElementById('sendBtn');
            const stopBtn = document.getElementById('stopBtn');
            const mobileStopBtn = document.getElementById('mobileStopBtn');

            if (!text) return;
            if (!key) { openSidebar();
                document.getElementById('apiKey').focus();
                showToast('请先填写 API 密钥'); return; }

            streaming = true;
            lastUserMessage = text;
            currentTokenUsage = null;
            input.value = '';
            input.style.height = 'auto';
            btn.disabled = true;
            stopBtn.classList.add('visible');
            if (isMobile) mobileStopBtn.style.display = 'flex';

            const welcomeWrap = document.getElementById('welcomeWrap');
            if (welcomeWrap) welcomeWrap.remove();

            // 构建带文件内容的消息
            const fullMessage = buildUserMessageWithFiles(text);
            const timeStr = getFullTimeStr();
            renderUserMsg(text, true, timeStr);
            chatHistory.push({ role: 'user', content: fullMessage, _time: timeStr });
            if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);

            currentAiShellId = appendAiShell();
            const contentEl = document.getElementById(currentAiShellId);
            const timeEl = document.getElementById(currentAiShellId + '-time');
            currentFullText = '';

            const settings = getSettings();
            let messages = [];
            if (settings.systemPrompt && settings.systemPrompt.trim()) messages.push({ role: 'system',
                content: settings.systemPrompt.trim() });
            messages = messages.concat(chatHistory.map(m => ({ role: m.role, content: m.content })));

            abortController = new AbortController();
            const startTime = Date.now();

            try {
                const body = { model: currentModel, messages, stream: true, temperature: settings.temperature,
                    top_p: settings.topP, max_tokens: settings.maxTokens, frequency_penalty: settings.freqPenalty,
                    presence_penalty: settings.presPenalty };
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json',
                        Authorization: `Bearer ${key}` }, body: JSON.stringify(body), signal: abortController
                        .signal });
                if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message ||
                        `HTTP ${res.status}`); }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                contentEl.innerHTML = '<span class="cursor"></span>';
                let lastChunkData = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const raw = decoder.decode(value, { stream: true });
                    for (const line of raw.split('\n')) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            lastChunkData = json;
                            const delta = json.choices?.[0]?.delta?.content || '';
                            if (delta) {
                                currentFullText += delta;
                                contentEl.innerHTML = safeParse(currentFullText) + '<span class="cursor"></span>';
                                scrollBottom();
                            }
                            // 检查usage
                            if (json.usage) {
                                currentTokenUsage = json.usage;
                            }
                        } catch (e) {}
                    }
                }
                // 从最后一个chunk获取usage
                if (!currentTokenUsage && lastChunkData && lastChunkData.usage) {
                    currentTokenUsage = lastChunkData.usage;
                }
                const completionTimeStr = getFullTimeStr();
                if (timeEl) timeEl.textContent = completionTimeStr;

                contentEl.innerHTML = safeParse(currentFullText);
                chatHistory.push({ role: 'assistant', content: currentFullText, _time: completionTimeStr,
                    _tokenUsage: currentTokenUsage });
                saveHistory();
                finalizeStreamingMessage(currentTokenUsage);

            } catch (err) {
                if (err.name === 'AbortError') {
                    if (currentFullText) {
                        const completionTimeStr = getFullTimeStr();
                        if (timeEl) timeEl.textContent = completionTimeStr;
                        contentEl.innerHTML = safeParse(currentFullText);
                        chatHistory.push({ role: 'assistant', content: currentFullText, _time: completionTimeStr,
                            _tokenUsage: currentTokenUsage });
                        saveHistory();
                        finalizeStreamingMessage(currentTokenUsage);
                    } else {
                        const shell = document.querySelector('[data-role="assistant-streaming"]');
                        if (shell) shell.remove();
                    }
                } else {
                    contentEl.innerHTML = safeParse(
                        `**请求失败：** ${escHtml(err.message || '未知错误')}\n\n请检查 API 密钥或网络连接。`);
                    chatHistory.pop();
                }
            } finally {
                streaming = false;
                abortController = null;
                currentAiShellId = null;
                currentFullText = '';
                currentTokenUsage = null;
                btn.disabled = false;
                stopBtn.classList.remove('visible');
                if (isMobile) mobileStopBtn.style.display = 'none';
                if (!isMobile) input.focus();
                scrollBottom();
            }
        }

        function finalizeStreamingMessage(tokenUsage) {
            const wrap = document.querySelector('[data-role="assistant-streaming"]');
            if (wrap) {
                wrap.removeAttribute('data-role');
                wrap.setAttribute('data-role', 'assistant');
                const msgBody = wrap.querySelector('.msg-body');
                if (msgBody && !msgBody.querySelector('.msg-actions')) {
                    // 添加token信息
                    if (tokenUsage && tokenUsage.total_tokens) {
                        const tokenDiv = document.createElement('div');
                        tokenDiv.className = 'msg-token-info';
                        tokenDiv.textContent =
                            `Tokens: ${tokenUsage.total_tokens.toLocaleString()} (提示: ${tokenUsage.prompt_tokens.toLocaleString()} | 生成: ${tokenUsage.completion_tokens.toLocaleString()})`;
                        msgBody.appendChild(tokenDiv);
                    }
                    const actions = document.createElement('div');
                    actions.className = 'msg-actions';
                    actions.innerHTML =
                        '<button class="msg-action-btn retry-btn" onclick="retryFromHere(this)">重新生成</button><button class="msg-action-btn" onclick="copyMessage(this)">复制回复</button>';
                    msgBody.appendChild(actions);
                }
            }
        }

        async function retryFromHere(btn) {
            if (streaming) return;
            const wrap = btn.closest('.message-wrap');
            if (!wrap) return;
            const allWraps = Array.from(document.getElementById('messages').querySelectorAll('.message-wrap'));
            const idx = allWraps.indexOf(wrap);
            if (idx < 0) return;
            const toRemove = allWraps.slice(idx);
            let removed = 0;
            for (let i = idx; i < allWraps.length; i++) {
                const role = allWraps[i].getAttribute('data-role');
                if (role === 'user' || role === 'assistant' || role === 'assistant-streaming' || role ===
                    'assistant-error') removed++;
            }
            toRemove.forEach(w => w.remove());
            chatHistory = chatHistory.slice(0, Math.max(0, chatHistory.length - removed));
            if (lastUserMessage) {
                const fullMessage = buildUserMessageWithFiles(lastUserMessage);
                const timeStr = getFullTimeStr();
                chatHistory.push({ role: 'user', content: fullMessage, _time: timeStr });
                renderUserMsg(lastUserMessage, false, timeStr);
                saveHistory();
                triggerRegenerate();
            }
        }

        async function triggerRegenerate() {
            if (streaming) return;
            const key = document.getElementById('apiKey').value.trim();
            if (!key) { openSidebar();
                document.getElementById('apiKey').focus();
                showToast('请先填写 API 密钥'); return; }

            streaming = true;
            currentTokenUsage = null;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('stopBtn').classList.add('visible');
            if (isMobile) document.getElementById('mobileStopBtn').style.display = 'flex';

            currentAiShellId = appendAiShell();
            const contentEl = document.getElementById(currentAiShellId);
            const timeEl = document.getElementById(currentAiShellId + '-time');
            currentFullText = '';

            const settings = getSettings();
            let messages = [];
            if (settings.systemPrompt && settings.systemPrompt.trim()) messages.push({ role: 'system',
                content: settings.systemPrompt.trim() });
            messages = messages.concat(chatHistory.map(m => ({ role: m.role, content: m.content })));

            abortController = new AbortController();

            try {
                const body = { model: currentModel, messages, stream: true, temperature: settings.temperature,
                    top_p: settings.topP, max_tokens: settings.maxTokens, frequency_penalty: settings.freqPenalty,
                    presence_penalty: settings.presPenalty };
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json',
                        Authorization: `Bearer ${key}` }, body: JSON.stringify(body), signal: abortController
                        .signal });
                if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message ||
                        `HTTP ${res.status}`); }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                contentEl.innerHTML = '<span class="cursor"></span>';
                let lastChunkData = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const raw = decoder.decode(value, { stream: true });
                    for (const line of raw.split('\n')) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            lastChunkData = json;
                            const delta = json.choices?.[0]?.delta?.content || '';
                            if (delta) {
                                currentFullText += delta;
                                contentEl.innerHTML = safeParse(currentFullText) + '<span class="cursor"></span>';
                                scrollBottom();
                            }
                            if (json.usage) currentTokenUsage = json.usage;
                        } catch (e) {}
                    }
                }
                if (!currentTokenUsage && lastChunkData && lastChunkData.usage) {
                    currentTokenUsage = lastChunkData.usage;
                }
                const completionTimeStr = getFullTimeStr();
                if (timeEl) timeEl.textContent = completionTimeStr;
                contentEl.innerHTML = safeParse(currentFullText);
                chatHistory.push({ role: 'assistant', content: currentFullText, _time: completionTimeStr,
                    _tokenUsage: currentTokenUsage });
                saveHistory();
                finalizeStreamingMessage(currentTokenUsage);
            } catch (err) {
                if (err.name === 'AbortError') {
                    if (currentFullText) {
                        const completionTimeStr = getFullTimeStr();
                        if (timeEl) timeEl.textContent = completionTimeStr;
                        contentEl.innerHTML = safeParse(currentFullText);
                        chatHistory.push({ role: 'assistant', content: currentFullText, _time: completionTimeStr,
                            _tokenUsage: currentTokenUsage });
                        saveHistory();
                        finalizeStreamingMessage(currentTokenUsage);
                    } else {
                        const shell = document.querySelector('[data-role="assistant-streaming"]');
                        if (shell) shell.remove();
                    }
                } else {
                    contentEl.innerHTML = safeParse(`**请求失败：** ${escHtml(err.message || '未知错误')}`);
                }
            } finally {
                streaming = false;
                abortController = null;
                currentAiShellId = null;
                currentFullText = '';
                currentTokenUsage = null;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('stopBtn').classList.remove('visible');
                if (isMobile) document.getElementById('mobileStopBtn').style.display = 'none';
                if (!isMobile) document.getElementById('userInput').focus();
                scrollBottom();
            }
        }

        function copyMessage(btn) {
            const msgContent = btn.closest('.msg-body')?.querySelector('.msg-content');
            if (!msgContent) return;
            const text = msgContent.innerText || msgContent.textContent || '';
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '已复制';
                setTimeout(() => { btn.textContent = '复制回复'; }, 1500);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = '已复制';
                setTimeout(() => { btn.textContent = '复制回复'; }, 1500);
            });
        }
    </script>
