<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>位佳宝欢乐发生器</title>
    <style>
        body {
            background: #ffe6f2;
            margin: 0;
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive;
        }

        #avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #ff0066;
            position: absolute;
            cursor: pointer;
            transition: 0.3s;
        }

        .crazy-mode {
            animation: rainbowBG 2s infinite;
        }

        #counter {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #ff0066;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .bomb {
            position: absolute;
            pointer-events: none;
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAALEgAACxIB0t1+/AAAABx0RVh0U29mdHdhcmUAQWRvYmUgRmlyZXdvcmtzIENTNui8sowAAAAWdEVYdENyZWF0aW9uIFRpbWUAMDIvMDEvMjTEs1KGAAAAY0lEQVQ4jWP4//8/A7UxEwONABMDjUBVdRUDh4DHfwYqAqYH7A8YqAkePHjwn4HKgAkIMDAwMDAwvHnz5v/v379JBkxMTMyMjIwMDAwMDH/+/AEACqU3Y3Cg9GoAAAAASUVORK5CYII=');
            width: 50px;
            height: 50px;
            animation: explode 1s forwards;
        }

        @keyframes rainbowBG {
            0% { background: #ff99cc; }
            20% { background: #ffff99; }
            40% { background: #99ff99; }
            60% { background: #9999ff; }
            80% { background: #ff99ff; }
            100% { background: #ff99cc; }
        }

        @keyframes explode {
            to {
                transform: scale(3);
                opacity: 0;
            }
        }

        .achievement {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: gold;
            padding: 10px;
            border-radius: 10px;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div id="counter">功德值：<span>0</span></div>
    <img id="avatar" src="zR.png" alt="欢乐源泉">
    
    <script>
        // 初始化配置
        const avatar = document.getElementById('avatar');
        let count = localStorage.getItem('crazyCount') || 0;
        let isCrazy = false;
        const sound = new Audio('fA.mp3');
        
        // 随机初始位置
        moveAvatar();

        // 主点击事件
        avatar.addEventListener('click', () => {
            count++;
            updateDisplay();
            
            // 基础效果
            playSound();
            createExplosion();
            avatar.style.transform = `scale(${1 + count*0.01})`;
            
            // 特殊事件触发
            if(count == 10) showAchievement('初级信徒');
            if(count == 50) document.body.classList.add('crazy-mode');
            if(count == 100) avatar.src = 'zR_crazy.png'; // 准备疯狂版图片
        });

        // 新增功能1: 自动逃跑
        setInterval(() => {
            if(count > 30 && Math.random() < 0.3) {
                moveAvatar();
                createBombEffect();
            }
        }, 1000);

        // 新增功能2: 连击系统
        let combo = 0;
        let lastClickTime = 0;
        setInterval(() => {
            if(Date.now() - lastClickTime > 1000) {
                if(combo > 3) {
                    showAchievement(`连击x${combo}！`);
                }
                combo = 0;
            }
        }, 100);

        // 功能函数
        function moveAvatar() {
            avatar.style.left = Math.random()*(window.innerWidth-200) + 'px';
            avatar.style.top = Math.random()*(window.innerHeight-200) + 'px';
        }

        function createExplosion() {
            const bomb = document.createElement('div');
            bomb.className = 'bomb';
            bomb.style.left = `${event.pageX-25}px`;
            bomb.style.top = `${event.pageY-25}px`;
            document.body.appendChild(bomb);
            setTimeout(() => bomb.remove(), 1000);
        }

        function playSound() {
            sound.currentTime = 0;
            sound.playbackRate = Math.random() * 1.5 + 0.5;
            sound.play();
        }

        function showAchievement(text) {
            const div = document.createElement('div');
            div.className = 'achievement';
            div.textContent = '🎉 成就解锁：' + text;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        function updateDisplay() {
            document.querySelector('#counter span').textContent = count;
            localStorage.setItem('crazyCount', count);
            combo++;
            lastClickTime = Date.now();
        }

        // 隐藏秘籍：按空格键开启弹幕模式
        document.addEventListener('keydown', (e) => {
            if(e.code === 'Space') {
                startBulletChat();
            }
        });

        function startBulletChat() {
            const comments = [
                '老板看了都点赞！', 
                '这是新型病毒吗？',
                '建议申报非物质文化遗产',
                '医学奇迹！',
                '功德+1'
            ];
            
            setInterval(() => {
                const div = document.createElement('div');
                div.style = `
                    position: fixed;
                    color: #ff0066;
                    font-size: 24px;
                    white-space: nowrap;
                    top: ${Math.random()*100}%;
                    animation: moveRight 10s linear;
                `;
                
                div.textContent = comments[Math.floor(Math.random()*comments.length)];
                document.body.appendChild(div);
                
                setTimeout(() => div.remove(), 10000);
            }, 1000);
        }
    </script>
</body>
</html>
